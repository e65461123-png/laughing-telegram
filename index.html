<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثير لايف | Atheer Live</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --dark-black: #050505;
            --card-gray: #121212;
            --gold: #ffeb3b;
        }

        body {
            background-color: var(--dark-black);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* عداد الزوار */
        .visitor-box {
            margin-top: 25px;
            padding: 8px 25px;
            border: 2px solid var(--neon-green);
            border-radius: 20px;
            background: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
            text-align: center;
        }

        .visitor-count {
            color: var(--neon-green);
            font-size: 1.8rem;
            font-weight: 900;
            text-shadow: 0 0 10px var(--neon-green);
            display: block;
        }

        /* الحاوية الرئيسية */
        .app-container {
            width: 90%;
            max-width: 420px;
            background: var(--card-gray);
            border-radius: 30px;
            padding: 25px;
            margin-top: 35px;
            border: 1px solid #252525;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .main-title {
            color: var(--gold);
            font-size: 1.5rem;
            margin-bottom: 25px;
            font-weight: bold;
        }

        /* شبكة المحافظ */
        .wallet-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .wallet-card {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid #333;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .wallet-card:active {
            transform: scale(0.92);
            border-color: var(--neon-green);
        }

        .wallet-card span { display: block; }
        .label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
        .number { font-size: 0.85rem; color: #eee; font-family: monospace; }

        /* زر الواتساب "النبض" */
        .whatsapp-main {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 25px;
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 235, 59, 0.7); }
            70% { transform: scale(1.02); box-shadow: 0 0 0 15px rgba(255, 235, 59, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 235, 59, 0); }
        }

        /* أيقونات التواصل */
        .social-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .social-item {
            background: #222;
            padding: 15px 5px;
            border-radius: 18px;
            font-size: 0.8rem;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .social-item:hover { border-color: var(--neon-green); background: #282828; }

        /* زر الخروج */
        .exit-btn {
            margin-top: 30px;
            color: #ff4b4b;
            background: none;
            border: 1px solid #ff4b4b33;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* شريط الأخبار المتحرك */
        .footer-ticker {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            border-top: 1px solid var(--neon-green);
            padding: 12px 0;
            overflow: hidden;
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            padding-right: 100%;
            animation: ticker 20s linear infinite;
            color: var(--neon-green);
            font-size: 0.95rem;
            font-weight: bold;
        }

        @keyframes ticker {
            0% { transform: translate3d(100%, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }
    </style>
</head>
<body>

    <div class="visitor-box">
        <span style="font-size: 0.8rem; color: #ccc;">إجمالي زوار المنصة</span>
        <span class="visitor-count">3565</span>
    </div>

    <div class="app-container">
        <div class="main-title">💰 بوابة الاستثمار المباشر</div>
        
        <div class="wallet-section">
            <div class="wallet-card" onclick="toggleWallet(this, '01021664984')">
                <span class="label">محفظة 1</span>
                <span class="number">01021****84</span>
            </div>
            <div class="wallet-item wallet-card" onclick="toggleWallet(this, '01017667875')">
                <span class="label">محفظة 2</span>
                <span class="number">01017****75</span>
            </div>
        </div>

        <button class="whatsapp-main">واتساب المبادرة</button>

        <div class="social-row">
            <div class="social-item">🎬 تيك توك</div>
            <div class="social-item">👥 فيسبوك</div>
            <div class="social-item">📢 تليجرام</div>
        </div>

        <button class="exit-btn" onclick="location.reload()">⏻ تسجيل الخروج</button>
    </div>

    <div class="footer-ticker">
        <div class="ticker-text">
             نظام المساهمة في السيادة الرقمية متاح الآن .. بروتوكول أثير يرحب بكم .. القائد عصام الكومي يرحب بكم .. الشفافية هي طريقنا للخير ..
        </div>
    </div>

    <script>
        function toggleWallet(element, fullNum) {
            let numSpan = element.querySelector('.number');
            if(numSpan.innerText.includes('*')) {
                numSpan.innerText = fullNum;
                numSpan.style.color = "#00ff41";
                setTimeout(() => {
                    numSpan.innerText = fullNum.substring(0, 5) + "****" + fullNum.slice(-2);
                    numSpan.style.color = "#eee";
                }, 5000); // يختفي بعد 5 ثواني للخصوصية
            }
        }
    </script>

</body>
</html>
