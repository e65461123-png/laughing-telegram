<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بروتوكول أثير | مركز السيطرة السيادي</title>
    <style>
        :root { --neon-green: #0f0; --gold: #ffd700; --bg-black: #050505; }
        body { background-color: var(--bg-black); color: var(--neon-green); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        
        /* شاشة القفل */
        #lock-screen { position: fixed; inset: 0; background: black; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        input { background: #111; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 10px; text-align: center; font-size: 20px; }

        /* الواجهة الرئيسية */
        #main-ui { display: none; height: 100vh; position: relative; border: 4px double var(--neon-green); box-sizing: border-box; }
        
        /* الأيقونات السيادية */
        .icon-btn { position: absolute; cursor: pointer; font-size: 30px; background: rgba(0,255,0,0.1); border: 1px solid var(--neon-green); padding: 15px; border-radius: 50%; transition: 0.3s; z-index: 10; box-shadow: 0 0 15px var(--neon-green); }
        .icon-btn:hover { background: var(--neon-green); color: black; transform: scale(1.1); }
        
        #vault-icon { top: 20px; right: 20px; } /* الخزنة */
        #satellite-icon { top: 20px; left: 20px; } /* القمر الصناعي */
        #crow-eye-icon { bottom: 100px; right: 20px; } /* عين الغراب */
        #corp-icon { bottom: 100px; left: 20px; } /* الشركات */

        /* مركز البيانات */
        #data-center { text-align: center; margin-top: 80px; }
        #main-balance { font-size: 2.5rem; color: var(--gold); text-shadow: 0 0 20px gold; cursor: pointer; }
        
        /* لوحة التحكم (الخزنة) */
        #vault-panel { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; border: 2px solid var(--gold); padding: 30px; width: 80%; max-width: 400px;
            z-index: 100; box-shadow: 0 0 50px rgba(255, 215, 0, 0.5); text-align: center;
        }
        .draw-btn { background: var(--gold); color: black; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; font-size: 1.2rem; }

        /* الرادار والشريط السفلي */
        #terminal { height: 120px; background: rgba(0,20,0,0.8); overflow-y: hidden; padding: 10px; font-size: 12px; border-top: 1px solid var(--neon-green); position: absolute; bottom: 0; width: 100%; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2>أدخل شفرة السيادة</h2>
        <input type="password" id="passkey" placeholder="369" maxlength="3">
        <button onclick="unlock()" class="draw-btn" style="width: auto; margin-top: 10px;">دخول</button>
    </div>

    <div id="main-ui">
        <div id="vault-icon" class="icon-btn" onclick="toggleVault()">💰</div>
        <div id="satellite-icon" class="icon-btn" onclick="alert('جاري الاتصال بالأقمار الصناعية...')">🛰️</div>
        <div id="crow-eye-icon" class="icon-btn" onclick="alert('تفعيل وضع عين الغراب...')">👁️</div>
        <div id="corp-icon" class="icon-btn" onclick="alert('فتح سجل الشركات والذهب...')">🏢</div>

        <div id="data-center">
            <p>الرصيد السيادي المباشر</p>
            <div id="main-balance" onclick="toggleVault()">19,146,368,176 ج.م</div>
            <p style="color:white">المحفظة المرتبطة: 01017667875</p>
        </div>

        <div id="vault-panel">
            <h3 style="color: var(--gold)">إدارة السحب المركزي</h3>
            <p>المبلغ المتاح للتسييل: 100,000 ج.م</p>
            <button class="draw-btn" onclick="startWithdrawal()">تأكيد سحب 100,000 ج.م</button>
            <button onclick="toggleVault()" style="background:none; border:none; color:red; cursor:pointer; margin-top:10px;">إغلاق</button>
        </div>

        <div id="terminal" id="term-text">
            > نظام أثير V1000000 نشط...<br>
            > جاري تأمين قنوات السحب...<br>
            > عين الغراب تلاحق قطاع السيادة...
        </div>
    </div>

    <script>
        function unlock() {
            if(document.getElementById('passkey').value === '369') {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                startTerminal();
            } else { alert('شفرة خاطئة'); }
        }

        function toggleVault() {
            const panel = document.getElementById('vault-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function startWithdrawal() {
            alert('تم إرسال الطلب للشبكة السيادية.. جاري تحويل أول 100 ألف جنيه إلى المحفظة 01017667875');
            toggleVault();
        }

        function startTerminal() {
            const term = document.getElementById('terminal');
            setInterval(() => {
                const lines = ["> تحديث أسعار الذهب...", "> استقرار النبض السيادي...", "> جاري استعادة أصول مشفرة...", "> السيادة الرقمية قيد التنفيذ..."];
                term.innerHTML += "<br>" + lines[Math.floor(Math.random() * lines.length)];
                term.scrollTop = term.scrollHeight;
            }, 3000);
        }
    </script>
</body>
</html>
