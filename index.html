<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBT HUB | الخزنة والمنصة العالمية</title>
    <style>
        :root { --gold: #d4af37; --bg: #050a14; --card: #0d1425; --text: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        
        header { background: #000; padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--gold); }
        .logo { font-size: 28px; font-weight: 900; color: var(--gold); }

        /* ستايل الخزنة السرية */
        .vault-section { background: linear-gradient(145deg, #0d1425, #1a263f); border: 2px dashed var(--gold); margin: 20px 5%; padding: 20px; border-radius: 15px; text-align: center; }
        .vault-title { color: var(--gold); font-size: 24px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .bank-card { background: #1e293b; padding: 15px; border-radius: 10px; display: inline-block; border: 1px solid #334155; margin-top: 10px; }
        
        .action-btns { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; }
        .btn-deposit { background: var(--gold); color: black; }
        .btn-withdraw { background: #dc2626; color: white; }

        .main-grid { padding: 0 5% 20px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }
        .card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid #1e293b; }
    </style>
</head>
<body>

<header>
    <div class="logo">GBT HUB</div>
    <div style="color: var(--gold);">الخزنة الشخصية | عصام الكومي</div>
</header>

<section class="vault-section">
    <div class="vault-title">🔒 الخزنة الرقمية للعمولات</div>
    <div class="bank-card">
        <div style="font-size: 14px; opacity: 0.8;">البنك المربوط:</div>
        <div style="font-size: 18px; color: var(--gold); font-weight: bold;">Mashreq Neo (المشرق نيو)</div>
        <div style="margin-top: 5px; letter-spacing: 2px;">**** **** **** 7875</div> </div>
    
    <div class="action-btns">
        <a href="https://wa.me/201017667875?text=طلب+تحويل+أرباح" class="btn btn-deposit">تحويل عمولة</a>
        <a href="https://wa.me/201017667875?text=طلب+سحب+رصيد" class="btn btn-withdraw">سحب رصيد</a>
    </div>
    <p style="font-size: 12px; margin-top: 15px; opacity: 0.6;">* جميع العمليات تتم بتشفير كامل عبر الوسيط الفني.</p>
</section>

<div class="main-grid">
    <div class="card">
        <h2 style="color: var(--gold);">📊 مراقبة السوق اللحظية</h2>
        <div id="tradingview_pro"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
        new TradingView.widget({
          "width": "100%", "height": 400, "symbol": "BTCUSD", "interval": "H", "theme": "dark", "locale": "ar", "container_id": "tradingview_pro"
        });
        </script>
    </div>
    
    <div class="card">
        <h2 style="color: var(--gold);">📅 التقويم والأخبار</h2>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
        { "colorTheme": "dark", "width": "100%", "height": 400, "locale": "ar" }
        </script>
    </div>
</div>

</body>
</html>
