<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية أثير | التحكم المطلق</title>
    <style>
        :root { --neon: #00ff41; --gold: #ffcc00; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow-x: hidden; }
        
        /* شاشات النظام */
        #gate, #admin-panel, #main-app { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        #main-app, #admin-panel { display: none; }

        .card { border: 2px solid var(--neon); padding: 30px; border-radius: 25px; text-align: center; width: 100%; max-width: 400px; background: rgba(0,0,0,0.9); box-shadow: 0 0 30px rgba(0,255,65,0.1); }
        input { width: 90%; padding: 15px; margin: 15px 0; background: #111; border: 1px solid var(--neon); color: var(--neon); border-radius: 12px; text-align: center; font-size: 20px; outline: none; }
        .btn { background: var(--neon); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        /* الرادار والواجهة */
        .radar { width: 100px; height: 100px; border: 2px solid var(--neon); border-radius: 50%; position: relative; margin-bottom: 20px; }
        .radar::after { content: ''; position: absolute; width: 50%; height: 2px; background: var(--neon); top: 50%; left: 50%; transform-origin: left; animation: scan 3s linear infinite; }
        @keyframes scan { to { transform: rotate(360deg); } }

        .gold-card { border-color: var(--gold); background: rgba(255,204,0,0.02); }
        .pay-num { font-size: 26px; color: var(--gold); font-weight: bold; display: block; margin: 10px 0; letter-spacing: 2px; }
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--neon); color: #000; font-size: 10px; padding: 10px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div id="gate">
    <div class="card">
        <h1 style="letter-spacing: 8px; margin:0;">ATHEER</h1>
        <p style="color: var(--gold); margin-bottom: 20px;">ادخل الكود للمتابعة</p>
        <input type="password" id="entryCode" placeholder="••••••">
        <button class="btn" onclick="verifyEntry()">دخول النظام 🔓</button>
        <p onclick="openAdminGate()" style="font-size: 10px; margin-top: 20px; opacity: 0.3;">إدارة السيادة</p>
    </div>
</div>

<div id="main-app">
    <div class="radar"></div>
    <h2 style="margin:0;">بروتوكول أثير للخير</h2>
    <p style="color: #888; font-size: 12px;">DIGITAL SOVEREIGNTY SYSTEM</p>
    
    <div class="card gold-card" style="margin-top: 20px;">
        <h3 style="color: var(--gold); margin:0;">💰 بوابة الاستثمار المباشر</h3>
        <div style="margin: 20px 0;">
            <span style="font-size: 12px; color: #fff;">المحفظة النشطة:</span>
            <span class="pay-num" id="displayNum">01021664984</span>
        </div>
        <a href="https://wa.me/201021664984" class="btn" style="background: var(--gold); text-decoration: none; display: block;">تأكيد التحويل (واتساب) 💸</a>
    </div>
    <button onclick="location.reload()" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer;">تشفير الخروج</button>
</div>

<div id="admin-panel">
    <div class="card" style="border-color: #ff4444;">
        <h2 style="color: #ff4444; margin:0;">لوحة تحكم القائد</h2>
        <p style="font-size: 12px;">تعديل بيانات المنصة فوراً</p>
        
        <div style="text-align: right; font-size: 12px;">
            <label>كود دخول الجمهور الجديد:</label>
            <input type="text" id="newPublicCode" placeholder="مثلاً: 2026">
            
            <label>رقم المحفظة الجديد:</label>
            <input type="text" id="newWalletNum" placeholder="010XXXXXXXX">
        </div>
        
        <button class="btn" style="background: #ff4444; color: #fff;" onclick="saveAdminChanges()">حفظ التعديلات السيادية 💾</button>
        <button onclick="location.reload()" style="background:none; border:none; color:#888; margin-top:15px; cursor:pointer;">إلغاء والعودة</button>
    </div>
</div>

<div class="footer">SYSTEM ID: ESSAM-2026 | SECURED BY ATHEER PROTOCOL</div>

<script>
    // جلب البيانات من الذاكرة المحلية أو استخدام الافتراضي
    let publicCode = localStorage.getItem('atheer_public_code') || '2026';
    let walletNum = localStorage.getItem('atheer_wallet_num') || '01021664984';

    // تحديث الواجهة بالبيانات الحالية
    document.getElementById('displayNum').innerText = walletNum;

    // وظيفة دخول الجمهور
    function verifyEntry() {
        const input = document.getElementById('entryCode').value;
        if(input === publicCode) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        } else {
            alert('الكود غير صحيح يا فندم!');
        }
    }

    // وظيفة فتح صفحة التعديل (سرية)
    function openAdminGate() {
        const adminPass = prompt("ادخل كلمة سر القائد لفتح صفحة التعديل:");
        if(adminPass === 'عصام2026') {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'flex';
        } else {
            alert("صلاحية غير مصرح بها!");
        }
    }

    // حفظ التعديلات من صفحة التعديل
    function saveAdminChanges() {
        const newCode = document.getElementById('newPublicCode').value;
        const newNum = document.getElementById('newWalletNum').value;

        if(newCode) localStorage.setItem('atheer_public_code', newCode);
        if(newNum) localStorage.setItem('atheer_wallet_num', newNum);

        alert('تم تحديث بروتوكول أثير بنجاح يا قائد عصام!');
        location.reload();
    }
</script>

</body>
</html>
