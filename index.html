<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية أثير | المركز السيادي</title>
    <style>
        :root { --atheer-green: #00ff41; --gold: #ffeb3b; --black: #020202; }
        body { background: var(--black); color: white; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        /* رادار المراقبة العالمية */
        .radar-container {
            width: 150px; height: 150px; border: 1px solid var(--atheer-green);
            border-radius: 50%; margin: 40px auto; position: relative;
            box-shadow: 0 0 20px rgba(0,255,65,0.2);
        }
        .radar-beam {
            position: absolute; width: 50%; height: 2px; background: var(--atheer-green);
            top: 50%; left: 50%; transform-origin: left; animation: scan 3s linear infinite;
        }
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .empire-card {
            width: 90%; max-width: 400px; background: #0a0a0a; border: 1px solid #1a1a1a;
            margin: 0 auto 100px; border-radius: 30px; padding: 30px; text-align: center;
        }

        /* نظام التشفير المالي */
        .secure-vault {
            background: rgba(0,255,65,0.05); border: 1px solid #222;
            padding: 15px; border-radius: 15px; margin-bottom: 25px;
        }
        .vault-num { color: var(--atheer-green); font-size: 1.1rem; letter-spacing: 3px; text-shadow: 0 0 10px var(--atheer-green); }

        /* بوابة جيش المبرمجين */
        .dev-portal {
            border: 1px solid var(--gold); padding: 15px; border-radius: 15px;
            margin-top: 25px; background: rgba(255,235,59,0.05);
        }

        .btn-emperor {
            background: var(--gold); color: black; border: none; width: 100%;
            padding: 20px; border-radius: 15px; font-size: 1.3rem; font-weight: 900;
            cursor: pointer; box-shadow: 0 0 30px rgba(255,235,59,0.2);
        }
    </style>
</head>
<body>

    <div class="radar-container">
        <div class="radar-beam"></div>
        <div style="position:absolute; top:40%; width:100%; text-align:center;">
            <span style="font-size:0.7rem; color:var(--atheer-green);">السيادة الرقمية</span><br>
            <span style="font-size:1.2rem; font-weight:bold;">ACTIVE</span>
        </div>
    </div>

    <div class="empire-card">
        <h1 style="color:var(--gold); margin-bottom:5px;">بروتوكول أثير</h1>
        <p style="color:#666; font-size:0.8rem; margin-bottom:30px;">نظام الإدارة المركزية للعالم الرقمي</p>

        <div class="secure-vault">
            <span style="font-size:0.7rem; color:#888;">محافظ التدفق الملياري</span><br>
            <span class="vault-num">84****01021</span>
        </div>

        <button class="btn-emperor" onclick="window.location.href='https://wa.me/201021664984'">تفعيل نظام الثروة 💰</button>

        <div class="dev-portal">
            <h3 style="color:var(--gold); margin:0; font-size:0.9rem;">بوابة جيش المبرمجين</h3>
            <p style="font-size:0.7rem; color:#888;">نحن نوظف العقول لتغيير العالم. انضم للبروتوكول.</p>
            <button style="background:none; border:1px solid #444; color:white; padding:5px 15px; border-radius:10px; cursor:pointer;">تقديم طلب الانضمام</button>
        </div>
    </div>

</body>
</html>
