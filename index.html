<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Nature Breaker V4</title>
    <style>
        :root { --neon-green: #00ff41; --gold: #ffd700; --bg-black: #000000; }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* Top Intelligence Bar */
        .top-bar { display: grid; grid-template-columns: repeat(4, 1fr); width: 100%; text-align: center; border-bottom: 1px solid #1a1a1a; padding: 10px 0; font-size: 0.8rem; }
        .time { color: var(--neon-green); font-weight: bold; font-size: 1.1rem; }
        
        /* Assets Section */
        .assets { display: flex; justify-content: space-around; width: 100%; margin: 20px 0; }
        .asset-box { text-align: center; }
        .asset-value { color: var(--neon-green); font-weight: bold; font-size: 1.2rem; }
        .status-369 { color: var(--neon-green); border: 1px solid var(--neon-green); padding: 5px 15px; border-radius: 5px; box-shadow: 0 0 10px var(--neon-green); }

        /* Main Raven Eye Circle */
        .raven-eye-container { margin: 40px 0; position: relative; width: 250px; height: 250px; border-radius: 50%; border: 4px solid var(--gold); display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); text-align: center; }
        .raven-eye-container::before { content: ''; position: absolute; width: 110%; height: 110%; border: 1px solid var(--gold); border-radius: 50%; animation: pulse 2s infinite; }
        
        /* Navigation Buttons */
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 400px; }
        .nav-btn { background: rgba(0,255,65,0.05); border: 1px solid var(--neon-green); color: var(--neon-green); padding: 10px; font-size: 0.7rem; cursor: pointer; text-align: center; }
        
        /* Cosmic & Satellite Viewports */
        #viewport { width: 100%; height: 450px; border: 2px solid var(--gold); margin-top: 20px; display: none; }

        /* Commands */
        .cmd-section { width: 100%; max-width: 400px; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; }
        #cmdInput { width: 100%; background: transparent; border: 1px solid var(--neon-green); color: white; padding: 10px; outline: none; }

        @keyframes pulse { 0% { opacity: 0.2; transform: scale(1); } 100% { opacity: 0; transform: scale(1.2); } }
    </style>
</head>
<body>

    <div class="top-bar">
        <div>CAIRO<br><span id="clock" class="time">--:--:--</span></div>
        <div>LONDON<br>--:--:--</div>
        <div>NY<br>--:--:--</div>
        <div>TOKYO<br>--:--:--</div>
    </div>

    <div class="assets">
        <div class="asset-box">GOLD ASSET<br><span class="asset-value">$2,348.12</span></div>
        <div class="asset-box">369 STATUS<br><span class="status-369">SECURED</span></div>
        <div class="asset-box">BITCOIN LIVE<br><span class="asset-value">$80,275.82</span></div>
    </div>

    <div class="nav-grid">
        <div class="nav-btn" onclick="executeCommand('/satellite')">🛰️ SATELLITE 369<br>LIVE EARTH VIEW</div>
        <div class="nav-btn" onclick="executeCommand('/cosmos')">🌌 COSMOS PORTAL<br>GALAXY MONITOR</div>
    </div>

    <div class="raven-eye-container">
        <h2 style="color: var(--gold); margin: 0; letter-spacing: 2px;">RAVEN EYE</h2>
        <p style="color: var(--neon-green); font-size: 0.8rem; margin: 5px 0;">NATURE BREAKER V4</p>
    </div>

    <div class="nav-grid">
        <div class="nav-btn">🛡️ SECURITY<br>AES-256_ACTIVE</div>
        <div class="nav-btn">📜 CONTRACT<br>ESSAM_OWNED</div>
    </div>

    <div id="log" style="color: var(--neon-green); font-size: 0.8rem; margin-top: 20px;">AWAITING MASTER COMMAND...</div>
    
    <iframe id="viewport" src=""></iframe>

    <div class="cmd-section">
        <input type="text" id="cmdInput" placeholder="Enter /cosmos, /satellite, or /master..." onkeypress="handleInput(event)">
    </div>

    <script>
        // Real-time Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000);

        function handleInput(e) {
            if (e.key === "Enter") {
                executeCommand(document.getElementById('cmdInput').value.toLowerCase());
                document.getElementById('cmdInput').value = "";
            }
        }

        function executeCommand(cmd) {
            const vp = document.getElementById('viewport');
            const log = document.getElementById('log');
            
            if (cmd === "/cosmos") {
                log.innerText = "COSMIC GATE ACTIVATED. SYNCING GALAXY DATA...";
                vp.src = "https://sky.esa.int/esasky-embed/?target=NGC%201300&zoom=0.5";
                vp.style.display = "block";
                vp.scrollIntoView({ behavior: 'smooth' });
            } else if (cmd === "/satellite") {
                log.innerText = "SATELLITE 369 LINK ESTABLISHED. TRACKING OVER CAIRO...";
                vp.src = "https://www.windy.com/?30.044,31.236,5"; // واجهة خريطة حية
                vp.style.display = "block";
                vp.scrollIntoView({ behavior: 'smooth' });
            } else if (cmd === "/master") {
                log.innerText = "WELCOME MASTER ESSAM ELKOMY. FULL SOVEREIGNTY GRANTED.";
                log.style.color = "var(--gold)";
            } else {
                log.innerText = "COMMAND NOT RECOGNIZED.";
                log.style.color = "red";
            }
        }
    </script>
</body>
</html>
