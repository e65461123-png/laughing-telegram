<div style="background: rgba(255,242,64,0.05); padding: 15px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 15px;">
    <p style="color: var(--gold); font-weight: bold; font-size: 0.9rem;">🚀 انشر الصاروخ التقني للعالم الآن</p>
    <div style="display: flex; justify-content: space-around; margin-top: 10px;">
        <button onclick="shareAtheer('wa')" style="background:#25D366; border:none; padding:10px; border-radius:10px; cursor:pointer;">🟢 واتساب</button>
        <button onclick="shareAtheer('tg')" style="background:#0088cc; border:none; padding:10px; border-radius:10px; cursor:pointer;">🔵 تليجرام</button>
        <button onclick="shareAtheer('fb')" style="background:#1877F2; border:none; padding:10px; border-radius:10px; cursor:pointer;">🔵 فيسبوك</button>
    </div>
</div>

<script>
function shareAtheer(platform) {
    const text = "انضموا الآن لصاروخ العصر التقني بقيادة القائد عصام الكومي.. بروتوكول أثير يغزو العالم! 🚀 ";
    const url = "https://e654611.github.io/laughing-telegram/";
    if(platform === 'wa') window.open(`https://api.whatsapp.com/send?text=${text} ${url}`);
    if(platform === 'tg') window.open(`https://t.me/share/url?url=${url}&text=${text}`);
    if(platform === 'fb') window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`);
}
</script>
