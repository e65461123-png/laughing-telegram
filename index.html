<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether Protocol | Final Sovereignty</title>
    <style>
        :root { --neon: #00ff41; --gold: #ffd700; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding-bottom: 150px; overflow-x: hidden; }
        
        /* 1. الشريط العلوي (الأرصدة والخزنة) */
        .top-nav { display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px; border-bottom: 2px solid var(--neon); background: #000; position: sticky; top: 0; z-index: 1000; font-size: 0.65rem; text-align: center; }
        .val { color: var(--neon); font-weight: bold; display: block; font-size: 0.8rem; }

        /* 2. منطقة الرصد الحي (الرادار والطيارات) */
        .main-display { padding: 10px; text-align: center; }
        #mapView { width: 100%; height: 280px; border: 1px solid var(--neon); border-radius: 10px; box-shadow: 0 0 10px var(--neon); }
        
        /* 3. عين الغراب (Nature Breaker Core) */
        .core-circle { width: 130px; height: 130px; border: 4px double var(--gold); border-radius: 50%; margin: 15px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 15px var(--gold); background: rgba(255,215,0,0.05); }
        
        /* 4. بوابة الكون (تفتح بملء الشاشة) */
        #gateView { width: 95%; height: 400px; border: 2px solid var(--gold); display: none; margin: 10px auto; }

        /* 5. مركز الأوامر العائم (القوي والواضح) */
        .cmd-center { 
            position: fixed; bottom: 20px; left: 5%; width: 90%; 
            background: #111; border: 2px solid var(--gold); border-radius: 15px; 
            padding: 15px; z-index: 99999; box-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
        }
        #cmdInput { 
            background: transparent; border: none; color: white; width: 100%; 
            font-size: 1.2rem; outline: none; text-align: center; font-weight: bold;
        }
        #log { color: var(--neon); font-size: 0.75rem; text-align: center; margin-bottom: 5px; }

    </style>
</head>
<body>

    <div class="top-nav">
        <div>CAIRO<span id="clock" class="val">--:--</span></div>
        <div>BITCOIN<span class="val">$84.3K</span></div>
        <div>GOLD<span class="val" style="color:var(--gold)">$2.6K</span></div>
        <div>STATUS<span class="val">SECURED</span></div>
    </div>

    <div class="main-display">
        <iframe id="mapView" src="https://www.windy.com/?30.044,31.236,6"></iframe>
        
        <div class="core-circle">
            <h3 style="color:var(--gold); margin:0; font-size: 0.8rem;">RAVEN EYE</h3>
            <small style="color:var(--neon); font-size: 0.6rem;">V4 MASTER</small>
        </div>

        <iframe id="gateView" src=""></iframe>
    </div>

    <div class="cmd-center">
        <div id="log">SYSTEM READY. WAITING FOR MASTER...</div>
        <input type="text" id="cmdInput" placeholder="اكتب /master أو /cosmos هنا" onkeypress="run(event)">
    </div>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        function run(e) {
            if (e.key === "Enter") {
                const cmd = document.getElementById('cmdInput').value.toLowerCase();
                const log = document.getElementById('log');
                const gate = document.getElementById('gateView');

                if (cmd === "/cosmos") {
                    log.innerText = "COSMOS PORTAL OPENED. SCANNING...";
                    gate.src = "https://sky.esa.int/esasky-embed/?target=NGC%201300&zoom=0.5";
                    gate.style.display = "block";
                    gate.scrollIntoView({ behavior: 'smooth' });
                } else if (cmd === "/master") {
                    log.innerText = "WELCOME MASTER ESSAM ELKOMY. FULL ACCESS.";
                    log.style.color = "var(--gold)";
                    document.body.style.boxShadow = "inset 0 0 50px rgba(255,215,0,0.2)";
                } else if (cmd === "/369") {
                    log.innerText = "369 FREQUENCY SYNCED.";
                }
                document.getElementById('cmdInput').value = "";
            }
        }
    </script>
</body>
</html>
