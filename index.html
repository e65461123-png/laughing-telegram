// ابحث عن الجزء الخاص بالـ Script في أسفل الكود واستبدله بهذا الجزء الذكي:

<script>
    let pCode = localStorage.getItem('atheer_p') || '2026';
    let wallet1 = localStorage.getItem('atheer_w1') || '01021664984';
    let wallet2 = localStorage.getItem('atheer_w2') || '01017667875';

    // تحديث المحافظ
    document.getElementById('w1').innerText = wallet1;
    document.getElementById('w2').innerText = wallet2;

    // --- نظام عداد الزوار العالمي الحقيقي ---
    // هذه الوظيفة تتصل بسيرفر خارجي لجلب العدد الحقيقي لزوار رابطك
    async function getRealVisitors() {
        try {
            // سنستخدم خدمة CountAPI المجانية
            const response = await fetch('https://api.countapi.xyz/hit/atheer-protocol-essam/visits');
            const data = await response.json();
            document.getElementById('vCounter').innerText = data.value.toString().padStart(4, '0');
        } catch (error) {
            // في حالة انقطاع السيرفر، نستخدم عداد احتياطي
            let visitors = parseInt(localStorage.getItem('atheer_v')) || 2480;
            document.getElementById('vCounter').innerText = (visitors + 1).toString().padStart(4, '0');
            localStorage.setItem('atheer_v', visitors + 1);
        }
    }

    getRealVisitors(); // تشغيل العداد الحقيقي فور فتح الموقع

    // باقي الوظائف (دخول، إدارة، حفظ)
    function login() {
        if(document.getElementById('passCode').value === pCode) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('tkr').style.display = 'block';
        } else { alert('الكود غير صحيح!'); }
    }

    function adminGate() {
        if(prompt("كلمة سر القائد:") === 'عصام2026') {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'flex';
        }
    }

    function saveData() {
        const c = document.getElementById('setNewPass').value;
        const n1 = document.getElementById('setNewW1').value;
        const n2 = document.getElementById('setNewW2').value;
        if(c) localStorage.setItem('atheer_p', c);
        if(n1) localStorage.setItem('atheer_w1', n1);
        if(n2) localStorage.setItem('atheer_w2', n2);
        alert('تم التحديث بنجاح!');
        location.reload();
    }
</script>
