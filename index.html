<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية أثير | القمة العالمية</title>
    <style>
        :root { --green: #00ff41; --gold: #ffeb3b; --black: #000; }
        body { background: var(--black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        /* رادار الاستقطاب العالمي */
        .radar {
            width: 140px; height: 140px; border: 2px solid var(--green); border-radius: 50%;
            margin: 30px auto; position: relative; box-shadow: 0 0 20px rgba(0,255,65,0.3);
        }
        .scan {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--green));
            opacity: 0.2; animation: rotate 2s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container { width: 92%; max-width: 450px; margin: 0 auto 100px; }

        /* صندوق المستثمرين (جلب الأموال) */
        .invest-box {
            background: linear-gradient(145deg, #111, #050505);
            border: 2px solid var(--gold); padding: 25px; border-radius: 30px;
            margin-bottom: 20px; box-shadow: 0 0 30px rgba(255,235,59,0.1);
        }

        .timer { color: #ff4b4b; font-weight: bold; font-size: 1.2rem; }

        /* صندوق المبرمجين (بناء الجيش) */
        .dev-box {
            background: rgba(0,255,65,0.05); border: 1px solid #222;
            padding: 20px; border-radius: 30px; margin-bottom: 20px;
        }

        .btn-main {
            background: var(--gold); color: black; width: 100%; padding: 20px;
            border-radius: 20px; font-size: 1.4rem; font-weight: 900; border: none;
            cursor: pointer; box-shadow: 0 10px 30px rgba(255,235,59,0.3);
        }

        .vault-glow { color: var(--green); text-shadow: 0 0 10px var(--green); font-family: monospace; font-size: 1.3rem; }
    </style>
</head>
<body>

    <div class="radar"><div class="scan"></div>
        <div style="position:absolute; top:40%; width:100%;">
            <span style="font-size:0.6rem; color:#888;">رصد المستثمرين</span><br>
            <span style="color:var(--green); font-weight:bold;">LIVE</span>
        </div>
    </div>

    <div class="container">
        <div class="invest-box">
            <h2 style="color:var(--gold); margin:0;">فرصة استثمارية كبرى</h2>
            <p style="font-size:0.8rem; color:#aaa;">انضم لبروتوكول أثير قبل إغلاق جولة التمويل الأولى</p>
            <div class="timer" id="timer">09:54:21</div>
            <button class="btn-main" style="margin-top:15px;" onclick="window.location.href='https://wa.me/201021664984'">تواصل لضخ الاستثمار 💰</button>
        </div>

        <div class="dev-box">
            <h3 style="margin:0; font-size:1rem;">بوابة المبرمجين (الجيش السري)</h3>
            <p style="font-size:0.7rem; color:#666;">مطلوب مطورين لتوسيع الإمبراطورية الرقمية</p>
            <span class="vault-glow">CODE: ATHEER-2026</span>
        </div>

        <div style="background:#0a0a0a; padding:20px; border-radius:30px; border:1px solid #1a1a1a;">
            <span style="font-size:0.7rem; color:#555;">محفظة السيادة 1</span><br>
            <span class="vault-glow">01021****84</span>
        </div>
    </div>

    <script>
        // عداد تنازلي حقيقي لإثارة الحماس
        function startTimer(duration, display) {
            var timer = duration, hours, minutes, seconds;
            setInterval(function () {
                hours = parseInt(timer / 3600, 10);
                minutes = parseInt((timer % 3600) / 60, 10);
                seconds = parseInt(timer % 60, 10);
                display.textContent = (hours < 10 ? "0" + hours : hours) + ":" + (minutes < 10 ? "0" + minutes : minutes) + ":" + (seconds < 10 ? "0" + seconds : seconds);
                if (--timer < 0) timer = duration;
            }, 1000);
        }
        window.onload = function () {
            startTimer(36000, document.querySelector('#timer'));
        };
    </script>
</body>
</html>
