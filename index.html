<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية أثير | بوابة السيادة المالية</title>
    <style>
        :root { --neon-green: #00ff41; --gold: #ffeb3b; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* شريط تدفق السيولة العالمي */
        .liquidity-ticker { background: #111; padding: 10px 0; border-bottom: 1px solid var(--neon-green); font-size: 0.8rem; overflow: hidden; white-space: nowrap; }
        .ticker-move { display: inline-block; animation: ticker 25s linear infinite; color: var(--neon-green); }
        @keyframes ticker { from { transform: translateX(100%); } to { transform: translateX(-100%); } }

        /* رادار القوة */
        .radar-box { width: 140px; height: 140px; border: 2px solid var(--neon-green); border-radius: 50%; margin: 30px auto; position: relative; box-shadow: 0 0 40px rgba(0,255,65,0.4); }
        .pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(from 0deg, transparent, var(--neon-green)); opacity: 0.3; animation: spin 1.5s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container { width: 92%; max-width: 500px; margin: 0 auto 100px; text-align: center; }

        /* منطقة جذب الأموال */
        .vault-card { background: linear-gradient(180deg, #0a0a0a, #000); border: 2px solid var(--gold); border-radius: 40px; padding: 30px; margin-top: 20px; box-shadow: 0 0 60px rgba(255,235,59,0.2); }
        .btn-pay { background: var(--gold); color: #000; width: 100%; padding: 22px; border-radius: 25px; font-size: 1.6rem; font-weight: 900; border: none; cursor: pointer; box-shadow: 0 15px 40px rgba(255,235,59,0.4); transition: 0.3s; }
        .btn-pay:active { transform: scale(0.95); }

        .secure-id { font-family: 'Courier New', monospace; color: var(--neon-green); font-size: 1.3rem; text-shadow: 0 0 10px var(--neon-green); }
    </style>
</head>
<body>

    <div class="liquidity-ticker">
        <div class="ticker-move">
             ✓ تم استقبال استثمار بقيمة 50,000$ .. ✓ انضمام مبرمج "كبير" لجيش أثير .. ✓ جولة التمويل مفتوحة الآن .. ✓ سيادة رقمية مطلقة ..
        </div>
    </div>

    <div class="radar-box"><div class="pulse"></div>
        <div style="position:absolute; top:40%; width:100%; text-align:center;">
            <span style="font-size:0.6rem; color:#888;">الزوار الحقيقيون</span><br>
            <span id="live-count" style="color:var(--neon-green); font-weight:bold; font-size:1.2rem;">3,565,210</span>
        </div>
    </div>

    <div class="container">
        <div class="vault-card">
            <h1 style="color:#fff; font-size:2rem; margin:0;">بروتوكول أثير</h1>
            <p style="color:var(--gold); font-size:0.9rem; letter-spacing: 3px;">القيادة المركزية: عصام الكومي</p>
            
            <div style="margin:25px 0;">
                <p style="font-size:0.7rem; color:#666;">مسار التحصيل السيادي المشفر</p>
                <div class="secure-id">01021****84</div>
            </div>

            <button class="btn-pay" onclick="window.location.href='https://wa.me/201021664984'">ضخ الأموال والبدء فوراً 💰</button>
            <p style="font-size:0.7rem; color:#444; margin-top:20px;">النظام جاهز لاستقبال التحويلات المليارية الآن.</p>
        </div>
    </div>

    <script>
        // تحديث العداد لإعطاء انطباع بالنمو اللحظي
        setInterval(() => {
            let count = document.getElementById('live-count');
            let val = parseInt(count.innerText.replace(/,/g, ''));
            count.innerText = (val + Math.floor(Math.random()*25)).toLocaleString();
        }, 1000);
    </script>
</body>
</html>
