<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER UNIFIED V6.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* إعادة التصميم الأصلي */
        body { background-color: #000; color: #00ffcc; font-family: 'Courier New', monospace; margin: 0; padding: 20px; overflow-x: hidden; }
        .header { border: 2px solid #00ffcc; padding: 10px; text-align: center; color: gold; text-shadow: 0 0 15px gold; background: rgba(255,215,0,0.1); margin-bottom: 20px; }
        .panel { border: 1px solid #00ffcc; padding: 15px; background: rgba(0,255,204,0.05); box-shadow: inset 0 0 20px #00ffcc; margin-bottom: 15px; border-radius: 10px; }
        .live-market { font-size: 2em; color: #0f0; font-weight: bold; text-shadow: 0 0 10px #0f0; }
        .radar-text { color: cyan; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <h1>AETHER CORE - MASTER_V6000</h1>
        <p>نظام السيادة الرقمية الحية</p>
    </div>

    <div class="panel">
        <h3>📊 GLOBAL MARKET TRACKER (LIVE)</h3>
        <p>سعر البيتكوين الحقيقي الآن:</p>
        <span id="btc-price" class="live-market">...رصد البيانات</span>
    </div>

    <div class="panel">
        <h3 class="radar-text">📡 RAVEN'S EYE STATUS</h3>
        <p>الموقع متصل بـ Firebase: <span style="color:white;">ACTIVE_NODE</span></p>
        <p>مزامنة الأقمار الصناعية: <span style="color:gold;">SYNCING...</span></p>
    </div>

    <script>
        // مفاتيحك السحابية (المحرك)
        const firebaseConfig = {
            apiKey: "AIzaSyDeqhNNIh41LXnu_O8ZyrwH4rj8TFBaKGo",
            authDomain: "aether-core-70770.firebaseapp.com",
            projectId: "aether-core-70770",
            databaseURL: "https://aether-core-70770-default-rtdb.firebaseio.com/",
            appId: "1:316022047365:web:951fc03d2a0d4fcca39fec"
        };
        firebase.initializeApp(firebaseConfig);

        // وظيفة سحب الأسعار العالمية
        async function fetchLiveMarket() {
            try {
                const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                const data = await response.json();
                document.getElementById('btc-price').innerText = "$" + data.bitcoin.usd.toLocaleString();
            } catch (err) { console.log("تحذير: النظام يحاول استعادة الاتصال بالبورصة"); }
        }
        setInterval(fetchLiveMarket, 10000);
        fetchLiveMarket();
    </script>
</body>
</html>
