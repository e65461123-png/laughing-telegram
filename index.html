<div class="master-terminal" style="border-color: #00ffff; box-shadow: 0 0 20px #00ffff;">
    <h3 style="color: #00ffff;">🕵️ وحدة الهكر الأخلاقي - استرداد الأصول</h3>
    <p style="font-size: 0.8em;">تتبع المحافظ المشبوهة واسترجاع البيتكوين المنهوب لخزنة الخير</p>

    <div id="scanner-box" style="background: #000; border: 1px solid #00ffff; height: 100px; overflow-y: auto; text-align: left; padding: 10px; font-size: 10px; color: #00ffff; margin-bottom: 10px;">
        [READY]: بانتظار إشارة المسح العالمي...
    </div>

    <button class="btn-main" style="background: #00ffff; color: #000;" onclick="startEthicalHack()">تفعيل بروتوكول الاسترداد الأخلاقي</button>
</div>

<script>
    function startEthicalHack() {
        const scanner = document.getElementById('scanner-box');
        const logs = [
            "[SCAN]: جاري فحص البلوكشين عن محافظ الهكرز السوداء...",
            "[TRACK]: تم رصد تحرك مشبوه في محفظة: 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa",
            "[HACK]: اختراق جدار الحماية للمحفظة المنهوبة...",
            "[DECRYPT]: فك تشفير المفاتيح المسروقة بنجاح.",
            "[RECOVER]: جاري سحب 25.4 BTC إلى الخزنة السرية لعصام الكومي...",
            "[DONE]: تم الاسترداد الأخلاقي بنجاح. الأصول مؤمنة الآن."
        ];

        let i = 0;
        const interval = setInterval(() => {
            if (i < logs.length) {
                scanner.innerHTML += `<br>${logs[i]}`;
                scanner.scrollTop = scanner.scrollHeight;
                i++;
            } else {
                clearInterval(interval);
                alert("تمت العملية! استعدنا الأصول المسروقة ووضعناها في خزنتك للعمل الخيري.");
                // تحديث الرصيد في الخزنة السرية
                let current = parseFloat(document.getElementById('balance').innerText.replace('$', '').replace(',', ''));
                document.getElementById('balance').innerText = `$${(current + 1500000).toLocaleString()}`;
            }
        }, 1500);
    }
</script>
