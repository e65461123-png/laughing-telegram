<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether | Operational Control</title>
    <style>
        :root { --neon: #00ff41; --gold: #ffd700; --bg: #000; --danger: #ff003c; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding-bottom: 160px; overflow-x: hidden; }
        
        /* شريط الأرصدة العلوي */
        .top-nav { display: grid; grid-template-columns: repeat(3, 1fr); padding: 12px; border-bottom: 2px solid var(--neon); background: #000; position: sticky; top: 0; z-index: 1000; font-size: 0.7rem; text-align: center; }
        .val { color: var(--neon); font-weight: bold; display: block; font-size: 0.85rem; }

        /* لوحة أيقونات العمل والسحب */
        .action-hub { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .btn-action { 
            background: rgba(255, 215, 0, 0.05); 
            border: 2px solid var(--gold); 
            border-radius: 15px; 
            padding: 25px 10px; 
            text-align: center; 
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }
        .btn-action:active { transform: scale(0.92); background: var(--gold); color: black; }
        .icon { font-size: 2.2rem; display: block; margin-bottom: 8px; }
        .btn-label { font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; }

        /* شاشة سحب الرصيد المنبثقة */
        #withdrawScreen { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            background: #0a0a0a; 
            border: 3px solid var(--gold); 
            padding: 25px; 
            z-index: 10000; 
            width: 85%; 
            border-radius: 20px; 
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
        }
        .withdraw-input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 80%; margin: 15px 0; font-size: 1.2rem; text-align: center; border-radius: 8px; }

        /* مركز الأوامر السفلي */
        .cmd-center { position: fixed; bottom: 20px; left: 5%; width: 90%; background: #000; border: 2px solid var(--neon); border-radius: 20px; padding: 15px; z-index: 9999; box-shadow: 0 0 20px var(--neon); }
        #cmdInput { background: transparent; border: none; color: white; width: 100%; font-size: 1.1rem; outline: none; text-align: center; }
        #log { color: var(--neon); font-size: 0.75rem; text-align: center; margin-bottom: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div>BALANCE<span class="val">$42,900.00</span></div>
        <div>BTC/USD<span class="val">$84,312</span></div>
        <div>NODE<span class="val">369-ONLINE</span></div>
    </div>

    <div style="text-align: center; padding: 20px 10px;">
        <h2 style="color: var(--gold); margin: 0; text-shadow: 0 0 10px var(--gold);">MASTER DASHBOARD</h2>
        <small style="color: var(--neon);">ESSAM ELKOMY | SECURE TERMINAL</small>
    </div>

    <div class="action-hub">
        <div class="btn-action" onclick="showWithdraw()">
            <span class="icon">💰</span>
            <span class="btn-label">سحب الأرصدة</span>
        </div>
        <div class="btn-action" onclick="startWork()">
            <span class="icon">⚡</span>
            <span class="btn-label">مباشرة العمل</span>
        </div>
        <div class="btn-action" onclick="alert('جاري مزامنة بيانات الرصد...')">
            <span class="icon">🛰️</span>
            <span class="btn-label">الرصد الحي</span>
        </div>
        <div class="btn-action" onclick="alert('الخزنة المشفرة AES-256 مفعلة')">
            <span class="icon">🔐</span>
            <span class="btn-label">مركز الأمان</span>
        </div>
    </div>

    <div id="withdrawScreen">
        <h3 style="color: var(--gold); margin-top: 0;">PORTAL WITHDRAWAL</h3>
        <p style="font-size: 0.8rem;">رصيدك المتاح: <span style="color:var(--neon)">$42,900</span></p>
        <input type="number" class="withdraw-input" placeholder="0.00">
        <div style="display: flex; gap: 10px; justify-content: center;">
            <button onclick="confirmWithdraw()" style="background: var(--neon); padding: 12px 20px; border: none; font-weight: bold; border-radius: 5px;">تأكيد السحب</button>
            <button onclick="hideWithdraw()" style="background: var(--danger); color: white; padding: 12px 20px; border: none; border-radius: 5px;">إلغاء</button>
        </div>
    </div>

    <div class="cmd-center">
        <div id="log">SYSTEM READY. AWAITING MASTER COMMAND...</div>
        <input type="text" id="cmdInput" placeholder="أدخل الأوامر السيادية هنا..." onkeypress="run(event)">
    </div>

    <script>
        function showWithdraw() { document.getElementById('withdrawScreen').style.display = 'block'; }
        function hideWithdraw() { document.getElementById('withdrawScreen').style.display = 'none'; }
        
        function confirmWithdraw() {
            alert('جاري توجيه الدفع عبر شبكة فودافون كاش... الماستر عصام في انتظار التأكيد.');
            hideWithdraw();
        }

        function startWork() {
            document.getElementById('log').innerText = "WORK CHANNELS INITIALIZED... DATA SYNC ACTIVE.";
            document.getElementById('log').style.color = "var(--gold)";
            alert("تم تفعيل قنوات العمل المباشرة بنجاح.");
        }

        function run(e) {
            if (e.key === "Enter") {
                const cmd = document.getElementById('cmdInput').value.toLowerCase();
                if (cmd === "/master") {
                    document.getElementById('log').innerText = "ACCESS GRANTED: WELCOME ESSAM ELKOMY.";
                    document.getElementById('log').style.color = "var(--gold)";
                }
                document.getElementById('cmdInput').value = "";
            }
        }
    </script>
</body>
</html>
