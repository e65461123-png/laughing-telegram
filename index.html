<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام أثير السيادي</title>
    <style>
        :root { --neon: #00ff41; --gold: #ffcc00; --bg: #000; }
        body { background: var(--bg); color: var(--neon); font-family: 'Segoe UI', sans-serif; margin: 0; }
        
        /* شاشة الدخول */
        #gate, #admin-view { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #0a1a0a, #000); }
        .card { border: 2px solid var(--neon); padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 400px; background: #000; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid var(--neon); color: var(--neon); text-align: center; border-radius: 8px; }
        .btn { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* شاشة المستخدمين */
        #user-view { display: none; padding: 20px; text-align: center; }
        .radar { width: 100px; height: 100px; border: 2px solid var(--neon); border-radius: 50%; margin: 0 auto 20px; position: relative; }
        .radar::after { content: ''; position: absolute; width: 50%; height: 2px; background: var(--neon); top: 50%; left: 50%; transform-origin: left; animation: scan 3s linear infinite; }
        @keyframes scan { to { transform: rotate(360deg); } }
        .pay-card { border: 2px solid var(--gold); padding: 20px; border-radius: 15px; margin-top: 20px; background: rgba(255,204,0,0.05); }

        /* صفحة التعديل المخفية */
        #admin-view { display: none; background: #050505; }
        .admin-box { border: 2px dashed #ff4444; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

<div id="gate">
    <div class="card">
        <h1 onclick="goToAdmin()" style="cursor:default">ATHEER</h1>
        <p style="color: var(--gold)">ادخل الكود للمتابعة</p>
        <input type="password" id="passInput" placeholder="كود الدخول">
        <button class="btn" onclick="login()">دخول النظام</button>
    </div>
</div>

<div id="user-view">
    <div class="radar"></div>
    <h2>بروتوكول أثير للخير</h2>
    <div class="pay-card">
        <h3 style="color: var(--gold)">بوابة الاستثمار</h3>
        <p id="displayNum1">01021664984</p>
        <p id="displayNum2">01017667875</p>
        <a href="#" class="btn" style="background:var(--gold); text-decoration:none; display:block">إرسال دعم</a>
    </div>
    <p style="margin-top:40px; font-size:10px; color:#333" onclick="goToAdmin()">إدارة النظام</p>
</div>

<div id="admin-view">
    <div class="card admin-box">
        <h2 style="color: #ff4444;">لوحة تحكم القائد</h2>
        <p>تعديل كود الدخول:</p>
        <input type="text" id="newPass" placeholder="الكود الجديد">
        <p>تعديل محفظة 1:</p>
        <input type="text" id="newNum1" placeholder="رقم المحفظة 1">
        <button class="btn" style="background:#ff4444" onclick="saveChanges()">حفظ التعديلات السيادية 💾</button>
        <button class="btn" style="margin-top:10px; background:#444; color:#fff" onclick="location.reload()">خروج</button>
    </div>
</div>

<script>
    // القيم الافتراضية
    let currentPass = localStorage.getItem('atheer_pass') || '2026';
    let num1 = localStorage.getItem('atheer_num1') || '01021664984';

    // تحديث الأرقام في الواجهة
    document.getElementById('displayNum1').innerText = num1;

    function login() {
        const val = document.getElementById('passInput').value;
        if(val === currentPass) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('user-view').style.display = 'block';
        } else if(val === 'admin99') { // كود سري لفتح صفحة التعديل مباشرة
            goToAdmin();
        } else {
            alert('الكود خاطئ');
        }
    }

    function goToAdmin() {
        // حماية إضافية: يطلب كلمة سر الإدارة
        const master = prompt("ادخل كلمة سر الإدارة لفتح صفحة التعديل:");
        if(master === 'عصام2026') {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('user-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'flex';
        }
    }

    function saveChanges() {
        const p = document.getElementById('newPass').value;
        const n1 = document.getElementById('newNum1').value;
        
        if(p) localStorage.setItem('atheer_pass', p);
        if(n1) localStorage.setItem('atheer_num1', n1);
        
        alert('تم حفظ التعديلات بنجاح يا قائد!');
        location.reload();
    }
</script>

</body>
</html>
