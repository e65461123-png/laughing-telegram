<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atheer Protocol</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        .cyber-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.95)), url('https://w0.peakpx.com/wallpaper/340/944/HD-wallpaper-matrix-code-binary-code-green-numbers-black-background-technology-concepts-matrix.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }
        .wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding-bottom: 25px;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #00ffff;
        }
        .star-icon {
            font-size: 28px;
            color: #7cfc00;
            filter: drop-shadow(0 0 8px #7cfc00);
            cursor: pointer;
        }
        .nav-menu {
            display: flex;
            justify-content: space-around;
            width: 100%;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 12px 5px;
            border-radius: 10px;
            border: 1px solid rgba(0,255,255,0.2);
        }
        .nav-item {
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
        }
        .nav-item:active {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            transform: scale(0.95);
        }
        /* صندوق عرض البيانات الحية (البورصة والأمن) */
        .live-monitor {
            background: rgba(0, 255, 255, 0.05);
            border: 1px dashed #00ffff;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 5px rgba(0,255,255,0.5);
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .title-sub {
            font-size: 28px;
            color: #00ffff;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00ffff;
            font-weight: 900;
        }
        .title-main {
            font-size: 34px;
            color: #fff;
            margin-bottom: 10px;
            font-weight: 900;
        }
        .title-protocol {
            font-size: 38px;
            color: #00ffff;
            margin-bottom: 20px;
            font-weight: 900;
            text-shadow: 0 0 20px #00ffff;
        }
        .desc {
            font-size: 16px;
            color: #e0e0e0;
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 90%;
        }
        .btn-container {
            display: flex;
            width: 100%;
            gap: 15px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 15px 5px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,255,255,0.3);
        }
        .btn-cyan {
            background-color: #00ffff;
            color: #000;
        }
        .btn-cyan:active {
            background-color: #00cccc;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="cyber-bg"></div>

    <div class="wrapper">
        <div class="header">
            <span class="star-icon" onclick="triggerAction('main')">★</span>
            <span class="logo">Atheer Protocol</span>
        </div>

        <div class="nav-menu">
            <div class="nav-item" onclick="triggerAction('main')">الرئيسية</div>
            <div class="nav-item" onclick="triggerAction('ai')">AI</div>
            <div class="nav-item" onclick="triggerAction('radar')">البث</div>
            <div class="nav-item" onclick="triggerAction('security')">الأمن</div>
            <div class="nav-item" onclick="triggerAction('finance')">الاستثمار</div>
        </div>

        <div class="live-monitor">
            <div id="network-ip">🔒 نظام الأمن: جاري فحص الحماية...</div>
            <div id="btc-price" style="margin-top: 5px;">📈 البورصة: جاري سحب الأسعار الحية...</div>
        </div>

        <div class="main-content">
            <div class="title-sub">AETHER X</div>
            <div class="title-main">AETHER</div>
            <div class="title-protocol">PROTOCOL X</div>
            <div class="desc">منصة عالمية للذكاء الاصطناعي والأمن السيبراني والبث والاستثمار</div>
        </div>

        <div class="btn-container">
            <button class="btn btn-cyan" onclick="triggerAction('ai')">تشغيل الذكاء الاصطناعي</button>
            <button class="btn btn-cyan" onclick="triggerAction('finance')">ابدأ الآن</button>
        </div>
    </div>

    <script>
        // 1. جلب أسعار البورصة والاستثمار الحي تلقائياً وعرضها على الشاشة
        async function fetchLiveFinance() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
                const data = await res.json();
                if(document.getElementById('btc-price')) {
                    document.getElementById('btc-price').innerText = `💰 Bitcoin: $${data.bitcoin.usd.toLocaleString()} | Ethereum: $${data.ethereum.usd.toLocaleString()}`;
                }
                alert(`📊 أسعار الاستثمار الحية في بروتوكول أثير:\n• Bitcoin: $${data.bitcoin.usd.toLocaleString()}\n• Ethereum: $${data.ethereum.usd.toLocaleString()}`);
            } catch (err) {
                console.log("تعذر الاتصال التلقائي بسيرفر البورصة الحية...");
            }
        }

        // 2. نظام فحص الأمن السيبراني وعرض الـ IP والـ Ping الحقيقي للموبايل
        async function checkNetworkSecurity() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                if(document.getElementById('network-ip')) {
                    document.getElementById('network-ip').innerText = `🛡️ IP الحفاظ: ${data.ip} (آمن)`;
                }
                alert(`🛡️ تقرير بروتوكول الأمن لشبكتك الحالية:\n• عنوان الـ IP الفعلي: ${data.ip}\n• حالة الاتصال: مشفرة وآمنة تماماً عبر Quantum Security`);
            } catch (err) {
                console.log("جاري سحب بروتوكولات جدار الحماية للشبكة...");
            }
        }

        // تشغيل الفحص التلقائي بمجرد فتح التطبيق لملء البيانات
        window.onload = function() {
            checkNetworkSecurity();
            fetchLiveFinance();
            // تحديث دوري كل 10 ثوانٍ
            setInterval(fetchLiveFinance, 10000);
        };

        // 3. المحرك الشامل لتوجيه التاتش والأيقونات إلى السيرفرات والأنظمة الحقيقية
        function triggerAction(type) {
            switch(type) {
                case 'main':
                    alert("أهلاً بك يا معماري. إنت الآن في قلب لوحة التحكم الرئيسية لبروتوكول أثير.");
                    break;
                case 'ai':
                    window.location.href = "https://gemini.google.com";
                    break;
                case 'radar':
                    window.location.href = "https://www.zoomearth.com/";
                    break;
                case 'security':
                    checkNetworkSecurity();
                    break;
                case 'finance':
                    fetchLiveFinance();
                    break;
            }
        }
    </script>
</body>
</html>
