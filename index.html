<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بروتوكول أثير | القائد عصام الكومي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --g: #00ff41; --b: #000; }
        body { background: var(--b); color: var(--g); font-family: sans-serif; margin: 0; text-align: center; }
        .card { border: 1px solid var(--g); margin: 10px; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,255,65,0.2); }
        .btn { display: block; background: var(--g); color: #000; padding: 15px; margin: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .radar { width: 80px; height: 80px; border: 2px solid var(--g); border-radius: 50%; margin: 10px auto; position: relative; }
        .radar::after { content: ''; position: absolute; width: 50%; height: 2px; background: var(--g); top: 50%; left: 50%; transform-origin: left; animation: s 2s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
        #main { display: none; }
    </style>
</head>
<body>

<div id="login" style="padding-top: 50px;">
    <h2>🔐 نظام السيادة الرقمية</h2>
    <input type="password" id="ps" placeholder="كلمة المرور" style="padding:10px; border:1px solid var(--g); background:none; color:var(--g); border-radius:5px;"><br><br>
    <button onclick="go()" style="padding:10px 30px; background:var(--g); border:none; font-weight:bold; cursor:pointer;">دخول</button>
</div>

<div id="main">
    <div class="card">
        <div class="radar"></div>
        <h1>عصام الكومي 🛡️</h1>
        <p>مؤسس بروتوكول أثير للخير</p>
        <hr style="border:0.5px solid #222">
        <p>📱 واتساب: <a href="https://wa.me/201026046026" style="color:#fff">01026046026</a></p>
        <p>🌍 الموقع: مصر</p>
    </div>

    <div class="card">
        <h3>روابط السيادة 📡</h3>
        <a href="https://www.facebook.com/share/18S97Fv2vT/" class="btn">فيسبوك (Facebook)</a>
        <a href="https://www.tiktok.com/@atheer.live" class="btn">تيك توك (TikTok Live)</a>
        <a href="#" class="btn" style="background:#fff">رقم الطوارئ: 01026046026</a>
    </div>

    <div style="background:var(--g); color:#000; font-size:12px; font-weight:bold; padding:5px; position:fixed; bottom:0; width:100%;">
        نظام أثير لايف | الإصدار النهائي الموحد
    </div>
</div>

<script>
    function go() {
        if(document.getElementById('ps').value === '2026') {
            document.getElementById('login').style.display = 'none';
            document.getElementById('main').style.display = 'block';
        } else { alert('خطأ!'); }
    }
</script>

</body>
</html>
