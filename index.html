<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Protocol | Master Essam Elkomy 369</title>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0a0a0a; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .header { width: 100%; padding: 20px; border-bottom: 1px solid var(--neon-green); box-shadow: 0 0 15px var(--neon-green); background: #000; }
        .status { color: var(--neon-green); font-weight: bold; animation: blink 1.5s infinite; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 20px; width: 95%; max-width: 1200px; }
        .card { background: rgba(0, 255, 65, 0.05); border: 1px solid var(--neon-green); border-radius: 10px; padding: 20px; box-shadow: 0 0 10px rgba(0, 255, 65, 0.1); }
        
        /* Radar */
        .radar { width: 100px; height: 100px; border: 2px solid var(--neon-green); border-radius: 50%; margin: 10px auto; position: relative; overflow: hidden; }
        .radar::after { content: ''; width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent, var(--neon-green)); position: absolute; top: 0; left: 0; opacity: 0.3; animation: spin 2s linear infinite; }
        
        /* Global Map & Satellite */
        .map { height: 180px; background: url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_blank_without_borders.svg') no-repeat center; background-size: contain; opacity: 0.6; position: relative; margin: 10px 0; }
        .sat-point { width: 8px; height: 8px; background: var(--neon-green); border-radius: 50%; position: absolute; box-shadow: 0 0 15px var(--neon-green); animation: cityPulse 2s infinite ease-in-out; }
        
        /* City Positions */
        .cairo { top: 38%; left: 56%; }
        .dubai { top: 42%; left: 62%; }
        .ny { top: 35%; left: 25%; }
        
        /* Command Center */
        #cmdInput { background: transparent; border: 1px solid var(--neon-green); color: white; width: 90%; padding: 12px; margin-top: 10px; outline: none; font-size: 1.1rem; }
        
        /* Animations */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes cityPulse { 
            0% { transform: scale(1); opacity: 1; box-shadow: 0 0 10px var(--neon-green); }
            50% { transform: scale(1.8); opacity: 0.6; box-shadow: 0 0 20px #fff; }
            100% { transform: scale(1); opacity: 1; box-shadow: 0 0 10px var(--neon-green); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>AETHER PROTOCOL v3.6.9</h1>
        <div class="status">SYSTEM SECURED | MASTER ESSAM ELKOMY</div>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>LIVE MARKETS</h3>
            <p>BTC: <span style="color:var(--neon-green)">$80,284.45</span></p>
            <p>GOLD: <span style="color:var(--neon-green)">$2,680.12</span></p>
        </div>

        <div class="card">
            <div class="radar"></div>
            <p>RAVEN EYE ACTIVE</p>
        </div>

        <div class="card">
            <h3>SATELLITE 369 TRACKING</h3>
            <div class="map">
                <div class="sat-point cairo"></div>
                <div class="sat-point dubai"></div>
                <div class="sat-point ny"></div>
            </div>
            <p id="satStatus">SATELLITE POSITION: OVER CAIRO</p>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
            <div id="log">AETHER_OS > Awaiting Master Command...</div>
            <input type="text" id="cmdInput" placeholder="أدخل الأمر (مثال: /master)" onkeypress="runCmd(event)">
        </div>
    </div>

    <script>
        // Satellite Rotation Status
        const cities = ["CAIRO", "DUBAI", "NEW YORK"];
        let idx = 0;
        setInterval(() => {
            document.getElementById('satStatus').innerText = "SATELLITE POSITION: OVER " + cities[idx];
            idx = (idx + 1) % cities.length;
        }, 3000);

        // Command Engine
        function runCmd(e) {
            if (e.key === "Enter") {
                const val = document.getElementById('cmdInput').value.toLowerCase();
                const log = document.getElementById('log');
                if (val === "/master") { 
                    log.innerText = "ACCESS GRANTED. WELCOME MASTER ESSAM. SYSTEM FULLY OPERATIONAL."; 
                    log.style.color = "gold"; 
                } else if (val === "/369") { 
                    log.innerText = "ENERGY SYNCED. PROTOCOL 369 ACTIVE. FREQUENCY STABLE."; 
                    log.style.color = "#00ff41"; 
                } else { 
                    log.innerText = "UNKNOWN COMMAND. SECURITY ALERT."; 
                    log.style.color = "red"; 
                }
                document.getElementById('cmdInput').value = "";
            }
        }
    </script>
</body>
</html>
