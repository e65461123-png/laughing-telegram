<style>
    .radar-box { width: 150px; height: 150px; border: 2px solid #0f0; border-radius: 50%; position: relative; margin: 20px auto; overflow: hidden; background: repeating-radial-gradient(circle, #000 0, #000 10px, #0f0 11px, #000 12px); }
    .radar-sweep { position: absolute; width: 100%; height: 100%; background: linear-gradient(90deg, transparent 50%, rgba(0,255,0,0.3) 100%); animation: sweep 3s linear infinite; transform-origin: center; }
    @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .id-badge { color: #ffd700; font-weight: bold; border: 1px solid #ffd700; padding: 5px; margin-top: 5px; display: inline-block; font-size: 0.8rem; }
</style>

<div class="radar-box"><div class="radar-sweep"></div></div>
<p style="font-size: 0.8rem;">SATELLITE BEAM: <span id="coords">Scanning...</span></p>

<script>
// تحديث الإحداثيات الوهمية للرادار
setInterval(() => {
    const lat = (Math.random() * 180 - 90).toFixed(4);
    const lon = (Math.random() * 360 - 180).toFixed(4);
    document.getElementById('coords').innerText = `LAT: ${lat} | LON: ${lon}`;
}, 2000);

// تحديث وظيفة إرسال الرسالة لتوليد ID
function sendLegacy() {
    const name = document.getElementById('visitor-name').value;
    const msg = document.getElementById('visitor-msg').value;
    const display = document.getElementById('messages-display');

    if(name && msg) {
        const memberID = "AT-369-" + Math.floor(1000 + Math.random() * 9000);
        const time = new Date().toLocaleTimeString();
        const newMessage = `<div style="border-bottom: 1px solid #111; padding: 10px;">
            <span class="id-badge">${memberID}</span> <br>
            <b style="color: #0f0;">${name}:</b> ${msg} <br>
            <small style="color: #444;">Time: ${time}</small>
        </div>`;
        display.innerHTML = newMessage + display.innerHTML;
        
        // نظام التنبيه الصوتي
        speak("Member Verified. Legacy Saved.");
        
        document.getElementById('visitor-name').value = '';
        document.getElementById('visitor-msg').value = '';
    }
}

// وظيفة النطق الآلي
function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'en-US';
    window.speechSynthesis.speak(msg);
}
</script>
