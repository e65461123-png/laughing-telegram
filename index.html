<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER | مركز القيادة السيادية</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --neon: #00ff41; --gold: #ffcc00; --bg: #050505; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--neon); font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; }
        
        /* الخريطة ملء الشاشة بنمط رادار عسكري */
        #live-map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; filter: invert(100%) hue-rotate(180deg) brightness(0.5) contrast(1.3); z-index: 1; }

        /* لوحة التحكم المكبرة */
        .control-panel { 
            position: absolute; top: 30px; right: 30px; z-index: 1000; 
            background: rgba(0, 10, 0, 0.92); 
            padding: 35px; border: 3px solid var(--gold); 
            width: 450px; border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.25);
            backdrop-filter: blur(5px);
        }

        h2 { font-size: 2.4rem; color: var(--gold); margin: 0; text-shadow: 0 0 15px var(--gold); border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .leader-tag { font-size: 1.3rem; color: #fff; margin: 15px 0; }
        
        .stat-box { 
            font-size: 1.4rem; margin: 20px 0; padding: 15px; 
            border-right: 6px solid var(--neon); 
            background: rgba(0,255,65,0.08); 
            border-radius: 5px;
        }

        /* نافذة الأوامر المتطورة */
        #terminal { 
            height: 280px; background: #000; overflow-y: auto; 
            font-family: 'Courier New', monospace; font-size: 1.1rem; 
            color: var(--neon); padding: 20px; border: 1px solid var(--neon); 
            margin-top: 25px; border-radius: 10px; box-shadow: inset 0 0 10px var(--neon);
        }

        .btn-donate {
            background: var(--gold); color: #000; border: none; padding: 20px;
            width: 100%; font-size: 1.4rem; font-weight: bold; cursor: pointer;
            margin-top: 20px; border-radius: 12px; transition: all 0.4s;
            text-transform: uppercase;
        }
        .btn-donate:hover { background: #fff; box-shadow: 0 0 30px var(--gold); transform: scale(1.02); }

        /* تأثير نبض الرادار */
        .radar-line {
            position: absolute; top: 50%; left: 50%; width: 400px; height: 400px;
            border: 2px solid var(--neon); border-radius: 50%;
            transform: translate(-50%, -50%); opacity: 0;
            animation: pulse 4s infinite; pointer-events: none; z-index: 2;
        }
        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="radar-line"></div>

<div class="control-panel">
    <h2>بروتوكول أثير 369</h2>
    <div class="leader-tag">القائد العام: <b>عصام الكومي</b></div>
    
    <div class="stat-box">
        الخزنة المركزية (سيولة حية): <br>
        <span id="vault" style="font-size: 2.2rem; color: #fff; font-weight: bold;">19,146,368.00 EGP</span>
    </div>

    <div style="font-size: 1.1rem; color: var(--gold); line-height: 1.8;">
        📍 الحساب البنكي: EG05...5904 <br>
        📱 فودافون كاش: 010...4984 <br>
        📡 حالة الربط: <span style="color:var(--neon)">متصل مباشر</span>
    </div>

    <button class="btn-donate" onclick="alert('جاري توثيق عملية الاستثمار في سجلات بروتوكول أثير...')">دعم مبادرة تطهير الترع</button>

    <div id="terminal">
        [SYSTEM]: تفعيل بروتوكول السيادة الرقمية...<br>
        [SYSTEM]: جاري مسح القطاع الجغرافي (مصر)...<br>
    </div>
</div>

<div id="live-map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    function initMap() {
        const map = L.map('live-map', { zoomControl: false, attributionControl: false }).setView([30.0444, 31.2357], 7);
        
        // نمط الخريطة الفضائية المظلمة
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // إضافة منطقة العمل (تطهير الترع) بنبضات ذهبية
        const canalArea = L.circle([31.0379, 31.3815], {
            radius: 25000, color: '#ffcc00', fillColor: '#ffcc00', fillOpacity: 0.3
        }).addTo(map);
        canalArea.bindPopup("<b style='color:#000'>موقع تطهير الترع - نشط الآن</b>");

        // عداد الخزنة المتحرك (إضافة قروش لإيهام المستثمر بالحركة اللحظية)
        let balance = 19146368.00;
        setInterval(() => {
            balance += Math.random() * 0.05;
            document.getElementById('vault').innerText = balance.toLocaleString(undefined, {minimumFractionDigits: 2}) + " EGP";
        }, 2000);

        // تحديث سجل العمليات (التيرمينال)
        const term = document.getElementById('terminal');
        const logs = [
            "تحديث إحداثيات 'ترعة السلام'...",
            "فحص تدفق السيولة في الحساب المركزي 5904",
            "رصد تحرك حفارات في قطاع الدلتا",
            "مزامنة البيانات مع الأقمار الصناعية",
            "تأمين بوابة الاستثمار 369",
            "تحديث منسوب المياه في القنوات المستهدفة"
        ];
        
        setInterval(() => {
            const log = logs[Math.floor(Math.random() * logs.length)];
            const time = new Date().toLocaleTimeString();
            term.innerHTML += `<div style="margin-bottom:5px;"><span style="color:var(--gold)">[${time}]</span> > ${log}</div>`;
            term.scrollTop = term.scrollHeight;
        }, 4500);
    }

    window.onload = initMap;
</script>

</body>
</html>
