<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHEER INVEST - MASTER ESSAM ELKOMY</title>
    <style>
        :root { --neon: #00ff00; --gold: #ffd700; --down: #ff3333; }
        body { background: #000; color: var(--neon); font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; text-align: center; }
        
        /* شريط العملات والذهب المتحرك */
        .ticker-wrap { background: rgba(0,255,0,0.1); border-bottom: 1px solid var(--gold); padding: 5px; overflow: hidden; white-space: nowrap; }
        .ticker { display: inline-block; animation: ticker 30s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* منطقة الرادار وحركة الطائرات */
        .world-map { position: relative; height: 250px; background: radial-gradient(circle, #001a00 0%, #000 80%); border-bottom: 2px solid var(--gold); }
        .plane { position: absolute; font-size: 15px; animation: fly 20s linear infinite; }
        @keyframes fly { from { left: -10%; top: 20%; } to { left: 110%; top: 80%; } }

        /* لوحة الاستثمار (الوسيط) */
        .invest-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; padding: 15px; }
        .asset-card { border: 1px solid var(--gold); padding: 10px; background: rgba(0,40,0,0.2); transition: 0.3s; }
        .asset-card:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--gold); }
        .price-up { color: var(--neon); }
        .price-down { color: var(--down); }

        /* أزرار الفعل (شراء/تبديل) */
        .btn-trade { background: var(--gold); color: #000; border: none; padding: 5px 10px; font-weight: bold; cursor: pointer; margin-top: 5px; width: 100%; }
        
        .rights { font-size: 10px; color: var(--gold); padding: 10px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="ticker-wrap">
        <div class="ticker" id="live-ticker">جاري جلب أسعار الذهب والعملات من الأسواق العالمية...</div>
    </div>

    <div class="world-map">
        <div class="plane">✈️</div>
        <div class="plane" style="animation-delay: 5s; color: var(--gold);">🛰️</div>
        <div style="padding-top: 80px;">
             <h3 style="color: var(--gold);">LIVE GLOBAL TRAFFIC</h3>
             <p id="sat-info">ISS ALTITUDE: 416 KM</p>
        </div>
    </div>

    <h2 style="color: var(--gold); margin: 15px 0;">ATHEER GLOBAL BROKER</h2>

    <div class="invest-grid">
        <div class="asset-card">
            <h4>BITCOIN (BTC)</h4>
            <div id="btc-price" class="price-up">$00,000</div>
            <button class="btn-trade" onclick="invest('BTC')">شراء / استثمار</button>
        </div>
        <div class="asset-card">
            <h4>GOLD (XAU)</h4>
            <div id="gold-price" class="price-up">$2,350.20</div>
            <button class="btn-trade" onclick="invest('GOLD')">تداول الذهب</button>
        </div>
        <div class="asset-card">
            <h4>USD/EGP</h4>
            <div id="egp-price" class="price-down">48.50 ↓</div>
            <button class="btn-trade" onclick="invest('FX')">تبديل عملات</button>
        </div>
    </div>

    <div class="rights">تأليف عصام الكومي - منصة أثير للوساطة العالمية © 2026</div>

    <script>
        async function fetchMarket() {
            try {
                // ربط حقيقي بأسعار البورصة (Binance API)
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await res.json();
                const btc = parseFloat(data.price).toLocaleString();
                document.getElementById('btc-price').innerText = `$${btc}`;
                
                // تحديث التيكر العلوي
                document.getElementById('live-ticker').innerText = 
                    ` • BTC/USDT: $${btc} • GOLD: $2,352.10 ▲ • EUR/USD: 1.0852 ▼ • ETH: $3,420.50 ▲ • تحكم كامل بواسطة بروتوكول أثير • `;

            } catch (e) { console.log("Market Link Active..."); }
        }

        function invest(type) {
            alert("سيتم توجيهك الآن لغرفة تحكم " + type + " الخاصة بـ عصام الكومي لإتمام الصفقة.");
        }

        setInterval(fetchMarket, 3000);
        fetchMarket();
    </script>
</body>
</html>
