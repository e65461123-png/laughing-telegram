<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether Omni-Protocol 369</title>
    <style>
        :root { --neon: #00ff41; --gold: #ffd700; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        .top-nav { display: grid; grid-template-columns: repeat(4, 1fr); padding: 10px; border-bottom: 2px solid var(--neon); background: #000; position: sticky; top: 0; z-index: 1000; font-size: 0.65rem; text-align: center; }
        .val { color: var(--neon); font-weight: bold; display: block; font-size: 0.8rem; }
        .news-ticker { background: rgba(0,255,65,0.1); color: var(--neon); padding: 5px; font-size: 0.7rem; white-space: nowrap; overflow: hidden; border-bottom: 1px solid #1a1a1a; }
        .news-ticker span { display: inline-block; animation: ticker 20s linear infinite; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .main-display { padding: 10px; text-align: center; }
        #liveRadar { width: 100%; height: 250px; border: 1px solid var(--neon); border-radius: 10px; margin-bottom: 10px; }
        .core-circle { width: 120px; height: 120px; border: 4px double var(--gold); border-radius: 50%; margin: 15px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 15px var(--gold); }
        #liveGate { width: 100%; height: 350px; border: 2px solid var(--gold); display: none; margin-top: 10px; }
        .cmd-center { position: fixed; bottom: 20px; left: 5%; width: 90%; background: #111; border: 2px solid var(--gold); border-radius: 15px; padding: 12px; z-index: 99999; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); text-align: center; }
        #cmdInput { background: transparent; border: none; color: white; width: 100%; font-size: 1.1rem; outline: none; text-align: center; }
    </style>
</head>
<body>
    <div class="top-nav">
        <div>CAIRO<span id="clock" class="val">--:--</span></div>
        <div>BITCOIN<span class="val">$84,312</span></div>
        <div>GOLD<span class="val" style="color:var(--gold)">$2,684</span></div>
        <div>369 STATUS<span class="val">SECURED</span></div>
    </div>
    <div class="news-ticker">
        <span>AI NEWS: Aether Protocol V4 Active | Cyber Sovereignty AES-256 Enabled | Global Markets: Bullish | Master Essam Identified...</span>
    </div>
    <div class="main-display">
        <iframe id="liveRadar" src="https://www.windy.com/?30.044,31.236,6"></iframe>
        <div class="core-circle">
            <h3 style="color:var(--gold); margin:0; font-size: 0.8rem;">RAVEN EYE</h3>
            <small style="color:var(--neon); font-size: 0.5rem;">ESSAM_OWNED</small>
        </div>
        <div id="log" style="color:var(--neon); font-size: 0.7rem;">SYSTEM READY...</div>
        <iframe id="liveGate" src=""></iframe>
    </div>
    <div class="cmd-center">
        <input type="text" id="cmdInput" placeholder="اكتب /master أو /cosmos هنا" onkeypress="run(event)">
    </div>
    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        function run(e) {
            if (e.key === "Enter") {
                const cmd = document.getElementById('cmdInput').value.toLowerCase();
                const gate = document.getElementById('liveGate');
                const log = document.getElementById('log');
                if (cmd === "/cosmos") {
                    log.innerText = "OPENING COSMOS GATE...";
                    gate.src = "https://sky.esa.int/esasky-embed/?target=NGC%201300&zoom=0.5";
                    gate.style.display = "block";
                    gate.scrollIntoView({ behavior: 'smooth' });
                } else if (cmd === "/master") {
                    log.innerText = "IDENTITY VERIFIED: WELCOME MASTER ESSAM ELKOMY.";
                    log.style.color = "var(--gold)";
                }
                document.getElementById('cmdInput').value = "";
            }
        }
    </script>
</body>
</html>
