<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية أثير | ATHEER PROTOCOL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --neon: #00ff41; --gold: #ffcc00; --bg: #050505; --card-bg: rgba(255, 255, 255, 0.03); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #0a2a0a 0%, transparent 70%); z-index: -1; pointer-events: none; }
        #gate, #main-app, #admin-panel { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        #main-app, #admin-panel { display: none; animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .container { width: 100%; max-width: 440px; }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(15px); border: 1px solid rgba(0, 255, 65, 0.2); border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); }
        .status-header { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .radar-box { width: 60px; height: 60px; border: 2px solid var(--neon); border-radius: 50%; position: relative; }
        .radar-box::after { content: ''; position: absolute; width: 50%; height: 2px; background: var(--neon); top: 50%; left: 50%; transform-origin: left; animation: scan 3s linear infinite; }
        @keyframes scan { to { transform: rotate(360deg); } }
        .visitor-mini { background: rgba(0,255,65,0.05); border: 1px solid rgba(0,255,65,0.2); border-radius: 10px; padding: 5px 12px; text-align: center; }
        .visitor-mini b { color: var(--neon); font-size: 18px; font-family: monospace; }
        .btn { padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; width: 100%; display: block; text-decoration: none; text-align: center; box-sizing: border-box; margin-top: 10px; }
        .btn-neon { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .btn-gold { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }
        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .social-link { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 15px; text-align: center; color: #fff; text-decoration: none; font-size: 11px; }
        .social-link i { font-size: 20px; margin-bottom: 8px; display: block; color: var(--neon); }
        input { width: 100%; padding: 15px; background: rgba(0,0,0,0.5); border: 1px solid var(--neon); color: var(--neon); border-radius: 12px; text-align: center; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .ticker-bar { position: fixed; bottom: 50px; width: 100%; background: rgba(0,0,0,0.8); border-top: 1px solid var(--neon); padding: 10px 0; z-index: 10; }
        .ticker-text { display: inline-block; white-space: nowrap; animation: ticker 25s linear infinite; color: var(--gold); font-weight: bold; font-size: 13px; }
        @keyframes ticker { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .footer { position: fixed; bottom: 0; width: 100%; background: var(--neon); color: #000; padding: 10px; text-align: center; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div id="gate">
    <div class="container" style="margin-top: 15vh;">
        <div class="glass-card" style="text-align: center;">
            <h1 style="letter-spacing: 10px; color: var(--neon);">ATHEER</h1>
            <input type="password" id="passCode" placeholder="كود المرور">
            <button class="btn btn-neon" onclick="login()">دخول النظام</button>
            <p onclick="adminGate()" style="opacity: 0.1; font-size: 8px; margin-top: 20px; cursor: pointer;">إدارة</p>
        </div>
    </div>
</div>
<div id="main-app">
    <div class="container">
        <div class="status-header">
            <div class="radar-box"></div>
            <div class="visitor-mini"><span>زوار المنصة</span><br><b id="vCounter">3560</b></div>
        </div>
        <div class="glass-card" style="border-color: var(--gold);">
            <h3 style="text-align: center; color: var(--gold);">💰 بوابة الاستثمار</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0;">
                <div style="text-align: center; background: #111; padding: 10px; border-radius: 10px;">
                    <span style="font-size: 10px; color: #888;">محفظة 1</span><br><b id="w1" style="color: var(--gold);">01021664984</b>
                </div>
                <div style="text-align: center; background: #111; padding: 10px; border-radius: 10px;">
                    <span style="font-size: 10px; color: #888;">محفظة 2</span><br><b id="w2" style="color: var(--gold);">01017667875</b>
                </div>
            </div>
            <a href="https://wa.me/201021664984" class="btn btn-gold">واتساب المبادرة</a>
        </div>
        <div class="social-grid">
            <a href="https://www.tiktok.com/@atheer.live" class="social-link"><i class="fab fa-tiktok"></i><span>تيك توك</span></a>
            <a href="#" class="social-link"><i class="fab fa-facebook-f"></i><span>فيسبوك</span></a>
            <a href="#" class="social-link"><i class="fab fa-telegram-plane"></i><span>تليجرام</span></a>
            <a href="#" class="social-link" onclick="location.reload()"><i class="fas fa-power-off"></i><span>خروج</span></a>
        </div>
    </div>
</div>
<div id="admin-panel">
    <div class="container">
        <div class="glass-card" style="border-color: #ff4444;">
            <h2 style="color: #ff4444; text-align: center;">لوحة التحكم</h2>
            <input type="text" id="setNewPass" placeholder="كود الدخول الجديد">
            <input type="text" id="setNewW1" placeholder="رقم محفظة 1">
            <input type="text" id="setNewW2" placeholder="رقم محفظة 2">
            <button class="btn btn-neon" onclick="saveData()">حفظ التعديلات</button>
            <button class="btn" style="background:#333; color:#fff" onclick="location.reload()">إلغاء</button>
        </div>
    </div>
</div>
<div class="ticker-bar" id="tkr" style="display:none;">
    <div class="ticker-text">📡 القائد عصام الكومي يرحب بكم في بروتوكول أثير .. 💰 نظام المساهمة في السيادة الرقمية متاح الآن ..</div>
</div>
<div class="footer">AUTHENTICATED BY ATHEER | V 8.0 | ESSAM ELKOMY</div>
<script>
    let pCode = localStorage.getItem('at_p') || '2026';
    let w1 = localStorage.getItem('at_w1') || '01021664984';
    let w2 = localStorage.getItem('at_w2') || '01017667875';
    let vCount = parseInt(localStorage.getItem('at_v')) || 3560;

    document.getElementById('w1').innerText = w1;
    document.getElementById('w2').innerText = w2;
    document.getElementById('vCounter').innerText = (vCount + 1);
    localStorage.setItem('at_v', vCount + 1);

    function login() {
        if(document.getElementById('passCode').value === pCode) {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            document.getElementById('tkr').style.display = 'block';
        } else { alert('خطأ!'); }
    }
    function adminGate() {
        if(prompt("كلمة سر القائد:") === 'عصام2026') {
            document.getElementById('gate').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'flex';
        }
    }
    function saveData() {
        const c = document.getElementById('setNewPass').value;
        const n1 = document.getElementById('setNewW1').value;
        const n2 = document.getElementById('setNewW2').value;
        if(c) localStorage.setItem('at_p', c);
        if(n1) localStorage.setItem('at_w1', n1);
        if(n2) localStorage.setItem('at_w2', n2);
        alert('تم الحفظ!');
        location.reload();
    }
</script>
</body>
</html>
