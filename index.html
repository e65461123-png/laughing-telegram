<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أثير لايف | البث المباشر</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --atheer-black: #050505;
            --gold-btn: #ffeb3b;
        }

        body {
            background-color: var(--atheer-black);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 1. عداد الزوار العلوي مع المؤشر المتحرك */
        .visitor-container {
            margin-top: 20px;
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orbit-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(0, 255, 65, 0.1);
            border-radius: 50%;
        }

        /* المؤشر المتحرك (الكرة المضيئة) */
        .moving-indicator {
            position: absolute;
            width: 15px;
            height: 15px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--neon-green);
            offset-path: border-box;
            animation: orbit 4s linear infinite;
        }

        @keyframes orbit {
            from { offset-distance: 0%; }
            to { offset-distance: 100%; }
        }

        .visitor-box {
            text-align: center;
            z-index: 10;
        }

        .visitor-label { font-size: 0.7rem; color: #888; }
        .visitor-count { font-size: 1.8rem; font-weight: bold; color: var(--neon-green); }

        /* 2. نافذة البث المباشر (Atheer Live) */
        .live-stream-container {
            width: 90%;
            max-width: 400px;
            height: 220px;
            background: #000;
            margin-top: 20px;
            border-radius: 20px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .live-badge {
            position: absolute;
            top: 10px; right: 10px;
            background: red;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* 3. بوابة الاستثمار والمحافظ */
        .investment-card {
            width: 90%;
            max-width: 400px;
            background: #111;
            border-radius: 30px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #222;
        }

        .wallet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
        }

        .wallet-item {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
        }

        .wallet-num {
            display: block;
            font-size: 0.9rem;
            margin-top: 5px;
            color: var(--neon-green);
            direction: ltr;
        }

        .main-btn {
            background: var(--gold-btn);
            color: black;
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            border: none;
            margin-top: 20px;
            font-size: 1.1rem;
        }

        /* شريط التمرير السفلي */
        .footer-ticker {
            position: fixed;
            bottom: 0; width: 100%;
            background: #000;
            border-top: 1px solid var(--neon-green);
            padding: 10px 0;
            white-space: nowrap;
            overflow: hidden;
        }

        .ticker-text {
            display: inline-block;
            animation: scroll 20s linear infinite;
            color: var(--neon-green);
        }

        @keyframes scroll {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <div class="visitor-container">
        <div class="orbit-ring"></div>
        <div class="moving-indicator"></div>
        <div class="visitor-box">
            <span class="visitor-label">زوار المنصة</span><br>
            <span class="visitor-count" id="count">3565</span>
        </div>
    </div>

    <div class="live-stream-container">
        <div class="live-badge">LIVE بث مباشر</div>
        <p style="color: #444;">جاري الاتصال بخادم أثير...</p>
        </div>

    <div class="investment-card">
        <h3 style="text-align: center; margin: 0;">💰 بوابة الاستثمار</h3>
        
        <div class="wallet-grid">
            <div class="wallet-item">
                <span style="font-size: 0.7rem;">محفظة 1</span>
                <span class="wallet-num">01021664984</span>
            </div>
            <div class="wallet-item">
                <span style="font-size: 0.7rem;">محفظة 2</span>
                <span class="wallet-num">01017667875</span>
            </div>
        </div>

        <button class="main-btn" onclick="window.location.href='https://wa.me/201021664984'">واتساب المبادرة</button>
    </div>

    <div class="footer-ticker">
        <div class="ticker-text">
            بإشراف القائد عصام الكومي .. نظام السيادة الرقمية متاح الآن .. استعدوا لغزو العالم رقمياً .. 
        </div>
    </div>

    <script>
        // تحديث العداد تلقائياً ليعطي إيحاء بالحيوية
        setInterval(() => {
            let countElement = document.getElementById('count');
            let currentCount = parseInt(countElement.innerText.replace(/,/g, ''));
            countElement.innerText = (currentCount + Math.floor(Math.random() * 5)).toLocaleString();
        }, 3000);
    </script>

</body>
</html>
