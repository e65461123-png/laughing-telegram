<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHEER V8000 - SUPREME COMMAND</title>
    <style>
        :root { --neon: #00ff00; --gold: #ffd700; }
        body { background: #000; color: var(--neon); font-family: monospace; text-align: center; margin: 0; padding: 10px; }
        .header { border-bottom: 2px solid var(--gold); padding: 10px; display: flex; justify-content: space-around; font-size: 0.8em; background: rgba(0,20,0,0.9); }
        
        /* الواجهة الأساسية (Raven Eye) */
        .radar-box { border: 2px solid var(--neon); border-radius: 50%; width: 220px; height: 220px; margin: 20px auto; position: relative; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .radar-sweep { width: 50%; height: 2px; background: var(--neon); position: absolute; top: 50%; left: 50%; transform-origin: 0% 0%; animation: scan 3s linear infinite; }
        
        .main-title { color: var(--gold); font-size: 1.2em; margin-top: 10px; letter-spacing: 2px; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .module { border: 1px solid var(--gold); padding: 10px; background: rgba(0,30,0,0.3); text-align: left; }
        .module h4 { margin: 0; color: var(--gold); border-bottom: 1px solid var(--gold); padding-bottom: 5px; }

        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .status-secured { color: var(--neon); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .rights { position: fixed; bottom: 5px; width: 100%; font-size: 10px; color: var(--gold); opacity: 0.7; }
    </style>
</head>
<body>

    <div class="header">
        <div>📡 الفضاء: <span id="sat">CONNECTING...</span></div>
        <div>💰 البورصة: <span id="btc">0.00$</span></div>
        <div>🛡️ الدفاع: <span class="status-secured">V8000 SECURED</span></div>
    </div>

    <div class="radar-box">
        <div class="radar-sweep"></div>
    </div>
    
    <div class="main-title">RAVEN EYE - NATURE BREAKER V4</div>
    <div style="font-size: 0.7em;">إحداثيات المدن: <span id="coords">30.04, 31.23</span></div>

    <div class="data-grid">
        <div class="module">
            <h4>💹 تداول السيادة</h4>
            <div id="m1">Bitcoin: Loading...</div>
            <div id="m2">Gold Index: Active</div>
        </div>
        <div class="module">
            <h4>🌍 رصد الأرض</h4>
            <div>القاهرة - لندن - طوكيو</div>
            <div id="m3" style="font-size: 0.8em;">Syncing...</div>
        </div>
    </div>

    <div class="rights">تأليف عصام الكومي - بروتوكول أثير © 2026</div>

    <script>
        async function updateV8000() {
            try {
                const btcRes = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const btcData = await btcRes.json();
                document.getElementById('btc').innerText = `$${parseFloat(btcData.price).toLocaleString()}`;
                document.getElementById('m1').innerText = `Bitcoin: $${btcData.price}`;

                const satRes = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const satData = await satRes.json();
                document.getElementById('sat').innerText = `ALT: ${satData.altitude.toFixed(0)}km`;
                document.getElementById('coords').innerText = `${satData.latitude.toFixed(2)}, ${satData.longitude.toFixed(2)}`;
                document.getElementById('m3').innerText = `ISS Position: ${satData.visibility}`;
            } catch (e) { console.log("Linking..."); }
        }
        setInterval(updateV8000, 2000);
        updateV8000();
    </script>
</body>
</html>
