<div class="investment-hub" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; padding:10px;">
    <button class="trade-btn" onclick="openPortal('buy-btc')" style="background:#f7931a; color:#fff; border:none; padding:10px; cursor:pointer; font-weight:bold;">BUY BITCOIN</button>
    <button class="trade-btn" onclick="openPortal('buy-stocks')" style="background:#0052ff; color:#fff; border:none; padding:10px; cursor:pointer; font-weight:bold;">BUY AVIATION ASSETS</button>
</div>

<script>
    // تحديث دالة الـ Portal لربط منصات التداول الحقيقية
    function openPortal(type) {
        const c = document.getElementById('p-content');
        if(type === 'buy-btc') {
            c.innerHTML = `<iframe src="https://www.binance.com/en/trade/BTC_USDT"></iframe>`;
        } else if(type === 'buy-stocks') {
            c.innerHTML = `<iframe src="https://www.etoro.com/markets/indices"></iframe>`;
        }
        // ... بقية الأكواد السابقة
    }
</script>
