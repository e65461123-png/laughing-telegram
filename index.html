<style>
    /* تنسيق لوحة التحكم كما في الصورة */
    .terminal-container {
        position: fixed;
        bottom: 10px;
        left: 5%;
        width: 90%;
        background: rgba(0, 0, 0, 0.9);
        border: 2px solid #ffd700; /* البرواز الذهبي */
        border-radius: 15px;
        padding: 10px;
        z-index: 999999;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .status-log {
        color: #00ff41; /* أخضر نيون */
        font-size: 0.7rem;
        height: 40px;
        overflow-y: hidden;
        border-bottom: 1px solid #333;
        margin-bottom: 5px;
        font-family: 'Courier New', monospace;
    }

    .input-wrapper {
        display: flex;
        align-items: center;
        background: #111;
        border-radius: 8px;
        padding: 5px 10px;
    }

    #masterCmd {
        background: transparent;
        border: none;
        color: #fff;
        width: 100%;
        font-size: 1rem;
        outline: none;
        padding: 5px;
    }

    .prompt-label {
        color: #ffd700;
        margin-right: 10px;
        font-weight: bold;
    }
</style>

<div class="terminal-container">
    <div id="sysLog" class="status-log">
        SYSTEM ONLINE...<br>
        AWAITING MASTER COMMAND_
    </div>
    
    <div class="input-wrapper">
        <span class="prompt-label">></span>
        <input type="text" id="masterCmd" placeholder="Awaiting Master Command..." onkeypress="handleCmd(event)">
    </div>
</div>

<script>
    function handleCmd(e) {
        if (e.key === "Enter") {
            const cmd = document.getElementById('masterCmd').value;
            const log = document.getElementById('sysLog');
            
            // تنفيذ الأوامر مع تحديث اللوج
            if (cmd.toLowerCase() === "/master") {
                log.innerHTML = "STATUS: ACCESS GRANTED<br>WELCOME MASTER ESSAM ELKOMY";
                log.style.color = "#ffd700";
            } else {
                log.innerHTML = "EXECUTING: " + cmd + "<br>PROCESSING DATA...";
            }
            
            document.getElementById('masterCmd').value = "";
        }
    }
</script>
