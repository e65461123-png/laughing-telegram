<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بروتوكول أثير | القائد عصام الكومي</title>
    <style>
        :root { --green: #00ff41; --gold: #fff240; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* الرادار الحقيقي */
        .radar {
            width: 130px; height: 130px; border: 2px solid var(--green); border-radius: 50%;
            margin: 30px auto; position: relative; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(0,255,65,0.1), transparent);
        }
        .sweep {
            position: absolute; width: 50%; height: 50%; top: 0; left: 50%;
            background: linear-gradient(45deg, var(--green), transparent);
            transform-origin: bottom left; border-radius: 100% 0 0 0;
            animation: rotate 4s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* حاوية البيانات الحقيقية */
        .main-box {
            width: 90%; max-width: 380px; background: #111; margin: 0 auto 100px;
            padding: 25px; border-radius: 40px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .live-frame {
            width: 100%; height: 180px; background: #000; border-radius: 20px;
            margin-bottom: 20px; border: 1px solid #333; display: flex; align-items: center; justify-content: center;
        }

        .wallet-card {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px;
            margin-bottom: 15px; border: 1px solid #222; cursor: pointer;
        }
        .glow-num { color: var(--green); font-weight: bold; text-shadow: 0 0 10px var(--green); }

        .btn-action {
            background: var(--gold); color: black; width: 100%; padding: 18px;
            border-radius: 20px; font-size: 1.2rem; font-weight: 900; border: none;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255,242,64,0.2);
        }

        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .s-link { background: #1a1a1a; padding: 12px; border-radius: 15px; text-decoration: none; color: #888; font-size: 0.8rem; border: 1px solid #222; }

        #counter { font-size: 1.5rem; font-weight: 900; color: var(--green); }
    </style>
</head>
<body>

    <div class="radar">
        <div class="sweep"></div>
        <div>
            <span style="font-size: 0.6rem; color: #888;">نشط الآن</span><br>
            <span id="counter">1,250</span> </div>
    </div>

    <div class="main-box">
        <div class="live-frame">
            <span style="color: #444;">[ نظام البث المباشر - أثير لايف ]</span>
        </div>

        <h1 style="font-size: 1.8rem; margin-bottom: 5px;">بروتوكول أثير</h1>
        <p style="color: var(--gold); font-size: 0.8rem; letter-spacing: 2px;">بقيادة القائد عصام الكومي</p>

        <div class="wallet-card" onclick="copyNum('01021664984')">
            <span style="font-size: 0.7rem; color: #666;">محفظة التدفق السيادي 1</span><br>
            <span class="glow-num">01021****84</span>
        </div>

        <button class="btn-gold" onclick="window.location.href='https://wa.me/201021664984'">دخول عالم العمالقة 🚀</button>

        <div class="social-grid">
            <a href="https://www.tiktok.com" class="s-link">Tiktok</a>
            <a href="https://www.facebook.com" class="s-link">Facebook</a>
            <a href="https://t.me" class="s-link">Telegram</a>
        </div>
    </div>

    <script>
        // دالة النسخ الحقيقية
        function copyNum(n) {
            navigator.clipboard.writeText(n);
            alert("🔒 تم تأمين ونسخ المحفظة للتحويل");
        }
        
        // محاكاة دخول زوار حقيقيين (سيتم ربطها بـ API لاحقاً)
        setInterval(() => {
            let count = document.getElementById('counter');
            let current = parseInt(count.innerText.replace(',',''));
            count.innerText = (current + Math.floor(Math.random() * 5)).toLocaleString();
        }, 3000);
    </script>
</body>
</html>
