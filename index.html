<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية أثير | الحصانة الرقمية</title>
    <script>
        document.oncontextmenu = () => false; // منع كليك يمين
        document.onkeydown = (e) => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false; }; // منع F12
    </script>
    <style>
        :root {
            --secure-green: #00ff41;
            --money-gold: #ffeb3b;
            --deep-black: #020202;
            --shield-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--deep-black);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* تأثير "مصفوفة الأمان" */
        .matrix-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 255, 65, 0.05) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 255, 65, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        /* لوحة التحكم المالية */
        .financial-hub {
            width: 90%;
            max-width: 450px;
            background: rgba(10, 10, 10, 0.95);
            border-radius: 40px;
            padding: 30px;
            margin-top: 40px;
            border: 2px solid #1a1a1a;
            box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px rgba(0, 255, 65, 0.1);
            text-align: center;
            backdrop-filter: blur(20px);
        }

        /* العداد المطور (قوة النظام) */
        .system-power {
            font-size: 0.8rem;
            color: var(--secure-green);
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* بطاقات المحافظ بنظام "التشفير البصري" */
        .crypto-card {
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
            border: 1px solid #333;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            cursor: pointer;
            position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .crypto-card:active { transform: scale(0.9); border-color: var(--secure-green); }

        .card-type { font-size: 0.7rem; color: #666; float: left; }
        .card-number { 
            font-size: 1.3rem; 
            margin-top: 15px; 
            font-family: 'Courier New', monospace;
            color: var(--money-gold);
            letter-spacing: 3px;
        }

        /* زر "توليد المال" (الأكشن الرئيسي) */
        .btn-money-machine {
            background: linear-gradient(to right, #ffd700, #ffeb3b);
            color: #000;
            width: 100%;
            padding: 22px;
            border-radius: 20px;
            font-size: 1.4rem;
            font-weight: 900;
            border: none;
            margin-top: 10px;
            box-shadow: 0 15px 30px rgba(255, 235, 59, 0.3);
            cursor: pointer;
        }

        /* شريط الحماية السفلي */
        .security-footer {
            position: fixed;
            bottom: 0; width: 100%;
            background: #000;
            border-top: 1px solid #1a1a1a;
            padding: 10px;
            font-size: 0.7rem;
            color: #444;
            display: flex;
            justify-content: space-around;
        }

        .encrypted-text { color: var(--secure-green); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="matrix-bg"></div>

    <div class="financial-hub">
        <div class="system-power">
            ● الحماية: مشفرة بالكامل | النظام: نشط
        </div>

        <h1 style="margin: 0; color: #fff;">أثير لايف <span style="color: var(--secure-green);">PRO</span></h1>
        <p style="color: #555; font-size: 0.8rem; margin-bottom: 30px;">نظام توليد القيمة والسيادة الرقمية</p>

        <div class="crypto-card" onclick="secureCopy('01021664984')">
            <span class="card-type">PREMIUM ACCESS</span>
            <div class="card-number" id="w1">**** **** 984</div>
            <div style="font-size: 0.6rem; color: var(--secure-green); margin-top: 10px;">إضغط للنسخ الآمن</div>
        </div>

        <div class="crypto-card" onclick="secureCopy('01017667875')">
            <span class="card-type">GLOBAL SECURE</span>
            <div class="card-number" id="w2">**** **** 875</div>
            <div style="font-size: 0.6rem; color: var(--secure-green); margin-top: 10px;">إضغط للنسخ الآمن</div>
        </div>

        <button class="btn-money-machine" onclick="location.href='https://wa.me/YOUR_NUMBER'">
            💰 انضم لماكينة المال
        </button>

        <div style="margin-top: 25px; display: flex; justify-content: center; gap: 20px;">
            <div style="color: #666; font-size: 0.8rem;">تيك توك</div>
            <div style="color: #666; font-size: 0.8rem;">فيسبوك</div>
            <div style="color: #666; font-size: 0.8rem;">تليجرام</div>
        </div>
    </div>

    <div class="security-footer">
        <span>IP: PROTECTED</span>
        <span class="encrypted-text">SECURE SSL ACTIVE</span>
        <span>v2.0.26 GLOBAL</span>
    </div>

    <script>
        function secureCopy(text) {
            navigator.clipboard.writeText(text);
            alert("✅ تم النسخ عبر قناة مشفرة!");
        }
        
        // حماية إضافية ضد محاولات الاختراق البسيطة
        setInterval(function() {
            console.clear();
            console.log("%cتحذير: هذا النظام محمي بواسطة بروتوكول أثير!", "color: red; font-size: 20px; font-weight: bold;");
        }, 1000);
    </script>
</body>
</html>
