<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether | Nature Breaker Ultimate</title>
    <style>
        :root { --neon: #00ff41; --gold: #ffd700; --bg: #000; --danger: #ff003c; }
        body { background: var(--bg); color: white; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        
        /* 1. لوحة الأرصدة والوقت (Header) */
        .top-nav { display: flex; justify-content: space-around; padding: 10px; border-bottom: 2px solid var(--neon); background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; }
        .stat { text-align: center; font-size: 0.8rem; }
        .val { color: var(--neon); font-weight: bold; display: block; }

        /* 2. منطقة الرصد والطيارات (Earth/Radar) */
        .main-display { padding: 20px; text-align: center; }
        #mapView { width: 100%; height: 350px; border: 1px solid var(--neon); border-radius: 10px; margin-bottom: 20px; }
        
        /* 3. دائرة عين الغراب (Nature Breaker Core) */
        .core-circle { width: 180px; height: 180px; border: 4px double var(--gold); border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 20px var(--gold); position: relative; }
        .core-circle::after { content: ''; position: absolute; width: 100%; height: 100%; border: 1px solid var(--neon); border-radius: 50%; animation: pulse 2s infinite; }

        /* 4. البوابات (Cosmos/Satellite) */
        #gateView { width: 100%; height: 500px; border: 3px solid var(--gold); display: none; margin-top: 20px; }

        /* 5. مركز الأوامر (Command Input) */
        .cmd-bar { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 2px solid var(--neon); padding: 15px; display: flex; align-items: center; box-sizing: border-box; }
        #cmdInput { background: transparent; border: none; color: var(--neon); width: 80%; font-size: 1.2rem; outline: none; padding-left: 15px; }
        .prompt { color: var(--neon); font-weight: bold; font-size: 1.2rem; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.3); opacity: 0; } }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="stat">TIME (CAIRO)<span id="clock" class="val">--:--:--</span></div>
        <div class="stat">BITCOIN<span class="val">$84,312.50</span></div>
        <div class="stat">GOLD ASSET<span class="val" style="color:var(--gold)">$2,684.10</span></div>
        <div class="stat">369 STATUS<span class="val">SECURED</span></div>
    </div>

    <div class="main-display">
        <h3>GROUND & AIR RADAR (ACTIVE)</h3>
        <iframe id="mapView" src="https://www.windy.com/?30.044,31.236,6"></iframe>

        <div class="core-circle">
            <h2 style="color:var(--gold); margin:0;">RAVEN EYE</h2>
            <small style="color:var(--neon)">NATURE BREAKER V4</small>
        </div>

        <div id="log" style="color:var(--neon); font-size: 0.9rem;">READY FOR SOVEREIGN INPUT...</div>

        <iframe id="gateView" src=""></iframe>
    </div>

    <div class="cmd-bar">
        <span class="prompt">MASTER_CMD></span>
        <input type="text" id="cmdInput" placeholder="اكتب /master أو /cosmos أو /369..." onkeypress="run(event)">
    </div>

    <script>
        // ساعة حية دقيقة
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
        }, 1000);

        function run(e) {
            if (e.key === "Enter") {
                const cmd = document.getElementById('cmdInput').value.toLowerCase();
                const log = document.getElementById('log');
                const gate = document.getElementById('gateView');

                if (cmd === "/cosmos") {
                    log.innerText = "OPENING COSMIC GATE... SCANNING SECTOR 369";
                    gate.src = "https://sky.esa.int/esasky-embed/?target=NGC%201300&zoom=0.5";
                    gate.style.display = "block";
                    gate.scrollIntoView({ behavior: 'smooth' });
                } else if (cmd === "/master") {
                    log.innerText = "ACCESS GRANTED. WELCOME MASTER ESSAM ELKOMY. VAULT UNLOCKED.";
                    log.style.color = "var(--gold)";
                    alert("⚠️ السيادة الكاملة مفعلة: الخزنة والأرصدة تحت تصرفك الآن.");
                } else if (cmd === "/369") {
                    log.innerText = "FREQUENCY SYNCED. SYSTEM SECURED.";
                    log.style.color = "var(--neon)";
                } else {
                    log.innerText = "UNKNOWN COMMAND. ACCESS DENIED.";
                    log.style.color = "var(--danger)";
                }
                document.getElementById('cmdInput').value = "";
            }
        }
    </script>
</body>
</html>
