<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>ATHEER SYNC - MASTER ESSAM ELKOMY</title>
    <style>
        :root { --neon: #00ff00; --gold: #ffd700; --mashreq: #ff5000; }
        body { background: #000; color: var(--neon); font-family: 'Courier New', monospace; margin: 0; text-align: center; }
        
        .master-vault { border: 3px double var(--gold); margin: 20px; padding: 25px; background: rgba(0,10,0,0.9); border-radius: 30px; }
        
        /* حالة الحسابات المربوطة */
        .sync-status { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .account-card { border: 1px solid var(--gold); padding: 10px; font-size: 12px; background: #050505; }
        .online { color: var(--neon); animation: blink 1s infinite; }

        /* منطقة السحب السريع */
        .quick-withdraw { background: linear-gradient(to bottom, #001a00, #000); border: 2px solid var(--gold); padding: 30px; border-radius: 20px; }
        .amount-display { font-size: 3em; color: var(--gold); text-shadow: 0 0 20px var(--gold); margin: 10px 0; }
        
        .btn-sync { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.2em; border-radius: 10px; box-shadow: 0 0 15px var(--gold); }
        
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="master-vault">
        <h2 style="color: var(--gold);">السيادة المالية: الماستر عصام الكومي</h2>
        
        <div class="sync-status">
            <div class="account-card">
                🏦 بنك المشرق: <span class="online">● مُتصل</span><br>
                <small>حساب رقم: ****369</small>
            </div>
            <div class="account-card">
                📱 المحافظ الإلكترونية: <span class="online">● مُتصل</span><br>
                <small>الرقم المسجل: 01xxxxxxxxx</small>
            </div>
        </div>

        <div class="quick-withdraw">
            <p>إجمالي الرصيد القابل للتحويل الفوري</p>
            <div class="amount-display" id="main-bal">$80,282.28</div>
            
            <input type="number" id="amt" placeholder="أدخل المبلغ المطلوب..." style="background:#000; color:#fff; border:1px solid var(--neon); padding:15px; width:80%; text-align:center; margin-bottom:20px;">
            
            <button class="btn-sync" onclick="processAutoPayout()">تحويل فوري إلى حسابي (المشرق/المحفظة)</button>
        </div>

        <div id="status-log" style="margin-top:20px; font-size:11px; color:var(--gold);">
            [SYSTEM]: جميع الحسابات موثقة ومؤمنة ببروتوكول أثير V14.0
        </div>
    </div>

    <script>
        let currentBalance = 80282.28;

        function processAutoPayout() {
            const val = parseFloat(document.getElementById('amt').value);
            const log = document.getElementById('status-log');

            if(val > 0 && val <= currentBalance) {
                currentBalance -= val;
                document.getElementById('main-bal').innerText = `$${currentBalance.toLocaleString()}`;
                
                log.innerHTML = `[SUCCESS]: تم إرسال $${val} مباشرة إلى حساب بنك المشرق.<br>[INFO]: تم تحديث المحفظة الإلكترونية بالرصيد الجديد.`;
                alert(`تم تنفيذ الأمر يا ماستر عصام. المبلغ $${val} في طريقه الآن لحسابك الشخصي المسجل لدينا.`);
            } else {
                alert("برجاء إدخال مبلغ صحيح ضمن نطاق الرصيد المتاح.");
            }
        }
    </script>
</body>
</html>
