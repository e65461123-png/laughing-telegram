<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Protocol | Live Space Feed 369</title>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0a0a0a; --gold: #ffd700; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .header { width: 100%; padding: 15px; border-bottom: 2px solid var(--neon-green); background: #000; box-shadow: 0 0 15px var(--neon-green); text-align: center; }
        .status { color: var(--neon-green); font-weight: bold; animation: blink 1.5s infinite; font-size: 0.8rem; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 20px; width: 95%; max-width: 1200px; }
        .card { background: rgba(0, 255, 65, 0.05); border: 1px solid var(--neon-green); border-radius: 10px; padding: 15px; box-shadow: 0 0 10px rgba(0, 255, 65, 0.1); }
        .radar { width: 70px; height: 70px; border: 2px solid var(--neon-green); border-radius: 50%; margin: 10px auto; position: relative; overflow: hidden; }
        .radar::after { content: ''; width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent, var(--neon-green)); position: absolute; top: 0; left: 0; opacity: 0.3; animation: spin 2s linear infinite; }
        .map { height: 120px; background: url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_blank_without_borders.svg') no-repeat center; background-size: contain; opacity: 0.5; position: relative; }
        .sat-point { width: 6px; height: 6px; background: var(--neon-green); border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        .cairo { top: 38%; left: 56%; }
        #spaceGate { width: 100%; height: 400px; border: 1px solid var(--gold); border-radius: 8px; display: none; margin-top: 15px; }
        .command-box { grid-column: 1 / -1; background: #000; padding: 15px; border: 1px solid var(--neon-green); }
        #cmdInput { background: transparent; border: none; color: white; width: 80%; outline: none; font-size: 1rem; padding-left: 10px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); } }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0;">AETHER PROTOCOL 369</h1>
        <div class="status">● LIVE SATELLITE FEED | MASTER: ESSAM ELKOMY</div>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>GLOBAL MARKETS</h3>
            <p>BTC: <span style="color:var(--neon-green)">$84,120.00</span></p>
            <p>GOLD: <span style="color:var(--gold)">$2,680.15</span></p>
            <div class="radar"></div>
        </div>

        <div class="card">
            <h3>SATELLITE POSITION</h3>
            <div class="map">
                <div class="sat-point cairo"></div>
            </div>
            <p style="font-size: 0.8rem; color: var(--neon-green);">NODE: CAIRO / ACTIVE</p>
        </div>

        <div class="card command-box">
            <div id="log">SYSTEM SECURED. Awaiting Command (/master, /369, /cosmos)...</div>
            <div style="display: flex; margin-top: 10px;">
                <span style="color:var(--neon-green)">CMD></span>
                <input type="text" id="cmdInput" placeholder="أدخل الأمر..." onkeypress="execute(event)">
            </div>
            <iframe id="spaceGate" src="https://www.youtube.com/embed/jPTD2gnZFUw?autoplay=1&mute=1" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        function execute(e) {
            if (e.key === "Enter") {
                const val = document.getElementById('cmdInput').value.toLowerCase();
                const log = document.getElementById('log');
                const gate = document.getElementById('spaceGate');

                if (val === "/cosmos") {
                    log.innerText = "OPENING COSMIC GATE... LIVE STREAMING FROM ISS.";
                    log.style.color = "cyan";
                    gate.style.display = "block";
                } else if (val === "/master") {
                    log.innerText = "WELCOME MASTER ESSAM. ACCESS GRANTED.";
                    log.style.color = "var(--gold)";
                } else if (val === "/369") {
                    log.innerText = "FREQUENCY 369 SYNCED. SYSTEM STABLE.";
                    log.style.color = "var(--neon-green)";
                } else {
                    log.innerText = "UNKNOWN COMMAND.";
                }
                document.getElementById('cmdInput').value = "";
            }
        }
    </script>
</body>
</html>
