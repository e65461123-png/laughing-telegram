<!DOCTYPE html>

        .secure-terminal { border: 4px solid var(--gold); margin: 20px; padding: 25px; background: #050505; }
        
        .account-display { background: rgba(0,255,0,0.05); border: 1px solid var(--gold); padding: 15px; margin: 15px 0; text-align: right; direction: ltr; font-size: 0.9em; }
        .hidden-data { color: var(--gold); letter-spacing: 2px; }
        
        .btn-investor { background: var(--neon); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .btn-withdraw { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1.4em; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="secure-terminal">
        <h2 style="color: var(--gold);">بوابة السيادة: عصام الكومي</h2>
        
        <div class="account-display" id="data-screen">
            🏦 MASHREQ: <span class="hidden-data">EG0500460203000000**********</span><br>

            [SECURE]: البيانات مشفرة حالياً لحماية الخصوصية...
