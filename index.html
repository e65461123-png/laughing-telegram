<div id="guestbook-section" style="margin-top: 30px; border-top: 1px dashed #0f0; padding-top: 20px;">
    <h3>📩 سجل الزوار السيادي</h3>
    <p style="font-size: 0.9rem; color: #888;">اترك بصمتك في تاريخ بروتوكول أثير</p>
    
    <input type="text" id="visitor-name" placeholder="اسمك أو لقبك الرقمي" style="width: 80%;">
    <textarea id="visitor-msg" placeholder="رسالتك للمبادرة..." style="width: 80%; background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; border-radius: 5px; height: 60px;"></textarea>
    <button onclick="sendLegacy()" style="margin-top: 10px; width: 50%;">إرسال للماستر</button>

    <div id="messages-display" style="margin-top: 20px; text-align: right; max-height: 200px; overflow-y: auto; background: #050505; padding: 10px; border-radius: 5px;">
        <p style="color: #555;">[نظام]: في انتظار الرسالة الأولى...</p>
    </div>
</div>

<script>
// محرك إرسال الرسائل
function sendLegacy() {
    const name = document.getElementById('visitor-name').value;
    const msg = document.getElementById('visitor-msg').value;
    const display = document.getElementById('messages-display');

    if(name && msg) {
        const time = new Date().toLocaleTimeString();
        const newMessage = `<div style="border-bottom: 1px solid #111; padding: 5px;">
            <b style="color: #ffd700;">${name}:</b> ${msg} <br>
            <small style="color: #444; font-size: 0.7rem;">تم الرصد في: ${time}</small>
        </div>`;
        display.innerHTML = newMessage + display.innerHTML;
        
        // مسح الحقول بعد الإرسال
        document.getElementById('visitor-name').value = '';
        document.getElementById('visitor-msg').value = '';
        alert("تم تسجيل بصمتك في سجلات أثير بنجاح ✅");
    } else {
        alert("برجاء إدخال الاسم والرسالة لتأكيد الهوية.");
    }
}
</script>
