<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Protocol | Master Essam Elkomy 369</title>
    <style>
        :root { --neon-green: #00ff41; --dark-bg: #0a0a0a; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .header { width: 100%; padding: 20px; border-bottom: 1px solid var(--neon-green); box-shadow: 0 0 15px var(--neon-green); background: #000; }
        .status { color: var(--neon-green); font-weight: bold; animation: blink 1.5s infinite; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 20px; width: 90%; }
        .card { background: rgba(0, 255, 65, 0.05); border: 1px solid var(--neon-green); border-radius: 10px; padding: 20px; box-shadow: 0 0 10px rgba(0, 255, 65, 0.1); }
        .radar { width: 100px; height: 100px; border: 2px solid var(--neon-green); border-radius: 50%; margin: 10px auto; position: relative; overflow: hidden; }
        .radar::after { content: ''; width: 100%; height: 100%; background: conic-gradient(from 0deg, transparent, var(--neon-green)); position: absolute; top: 0; left: 0; opacity: 0.3; animation: spin 2s linear infinite; }
        .map { height: 150px; background: url('https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_blank_without_borders.svg') no-repeat center; background-size: contain; opacity: 0.5; position: relative; }
        .sat-point { width: 6px; height: 6px; background: var(--neon-green); border-radius: 50%; position: absolute; animation: pulse 2s infinite; }
        #cmdInput { background: transparent; border: 1px solid var(--neon-green); color: white; width: 90%; padding: 10px; margin-top: 10px; outline: none; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 255, 65, 0.7); } 70% { transform: scale(2); box-shadow: 0 0 0 10px rgba(0, 255, 65, 0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>AETHER PROTOCOL v3.6.9</h1>
        <div class="status">SYSTEM SECURED | MASTER ESSAM ELKOMY</div>
    </div>
    <div class="dashboard">
        <div class="card">
            <h3>LIVE MARKETS</h3>
            <p>BTC: <span style="color:var(--neon-green)">$80,284.45</span></p>
            <p>GOLD: <span style="color:var(--neon-green)">$2,348.12</span></p>
        </div>
        <div class="card">
            <div class="radar"></div>
            <p>RAVEN EYE ACTIVE</p>
        </div>
        <div class="card">
            <h3>SATELLITE 369</h3>
            <div class="map"><div class="sat-point" style="top:30%; left:55%;"></div></div>
        </div>
        <div class="card" style="grid-column: 1 / -1;">
            <div id="log">Awaiting Command...</div>
            <input type="text" id="cmdInput" placeholder="Enter /master or /369" onkeypress="runCmd(event)">
        </div>
    </div>
    <script>
        function runCmd(e) {
            if (e.key === "Enter") {
                const val = document.getElementById('cmdInput').value.toLowerCase();
                const log = document.getElementById('log');
                if (val === "/master") { log.innerText = "WELCOME MASTER ESSAM. ACCESS GRANTED."; log.style.color = "gold"; }
                else if (val === "/369") { log.innerText = "ENERGY SYNCED. PROTOCOL 369 ACTIVE."; log.style.color = "#00ff41"; }
                else { log.innerText = "UNKNOWN COMMAND."; log.style.color = "red"; }
                document.getElementById('cmdInput').value = "";
            }
        }
    </script>
</body>
</html>
