<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية أثير | النسخة الرشيقة</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --gold: #ffeb3b;
            --deep-black: #050505;
            --card-bg: #111111;
        }

        body {
            background-color: var(--deep-black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            transform: scale(0.9); /* تصغير الواجهة بالكامل بنسبة بسيطة */
            transform-origin: top center;
        }

        /* رادار أصغر وأكثر دقة */
        .radar-section {
            margin-top: 20px;
            width: 120px; height: 120px;
            border: 2px solid var(--neon-green);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(0,255,65,0.1) 0%, transparent 70%);
        }

        .radar-sweep {
            position: absolute;
            width: 50%; height: 50%;
            top: 0; left: 50%;
            background: linear-gradient(45deg, var(--neon-green) 0%, transparent 50%);
            transform-origin: bottom left;
            border-radius: 100% 0 0 0;
            animation: sweep 4s linear infinite;
        }

        @keyframes sweep { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* حاوية التطبيق المصغرة */
        .app-card {
            width: 88%;
            max-width: 360px; /* تقليل العرض الأقصى */
            background: var(--card-bg);
            border-radius: 35px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #222;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            margin-bottom: 120px;
        }

        /* نافذة البث المباشر مصغرة */
        .live-window {
            width: 100%;
            height: 150px; /* تقليل الارتفاع */
            background: #000;
            border-radius: 20px;
            margin-bottom: 20px;
            position: relative;
            display: flex;
            align-items: center; justify-content: center;
            border: 1px solid #333;
        }

        .live-tag {
            position: absolute;
            top: 10px; right: 10px;
            background: red;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.65rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 50% { opacity: 0.5; } }

        /* المحافظ المنسقة */
        .wallet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .wallet-box {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 18px;
            border: 1px solid #282828;
        }

        .masked-num {
            color: var(--neon-green);
            font-size: 0.85rem;
            display: block;
            margin-top: 5px;
            direction: ltr;
        }

        /* زر الأكشن */
        .btn-gold {
            background: var(--gold);
            color: black;
            width: 100%;
            padding: 15px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }

        /* روابط السوشيال ميديا */
        .social-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .social-link {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            color: #ccc;
            text-decoration: none;
            border: 1px solid #222;
        }

        /* الشريط السفلي */
        .news-ticker {
            position: fixed;
            bottom: 0; width: 100%;
            background: #000;
            padding: 10px 0;
            border-top: 1px solid var(--neon-green);
        }

        .ticker-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll 25s linear infinite;
            color: var(--neon-green);
            font-weight: bold;
            font-size: 0.9rem;
        }

        @keyframes scroll { from { transform: translateX(100%); } to { transform: translateX(-100%); } }
    </style>
</head>
<body>

    <div class="radar-section">
        <div class="radar-sweep"></div>
        <div style="z-index: 10; text-align: center;">
            <span style="font-size: 0.55rem; color: #888;">الزوار</span><br>
            <span style="font-size: 1.2rem; font-weight: bold; color: var(--neon-green);">3,565,210</span>
        </div>
    </div>

    <div class="app-card">
        <div class="live-window">
            <div class="live-tag">LIVE مباشر</div>
            <span style="color: #333; font-size: 0.75rem;">ATHEER LIVE MONITOR</span>
        </div>

        <h2 style="margin: 0; font-size: 1.5rem;">بروتوكول أثير</h2>
        <p style="color: var(--gold); font-size: 0.75rem; margin-bottom: 20px;">بقيادة عصام الكومي</p>

        <div class="wallet-grid">
            <div class="wallet-box">
                <span style="font-size: 0.65rem; color: #666;">محفظة 1</span>
                <span class="masked-num">84****01021</span>
            </div>
            <div class="wallet-box">
                <span style="font-size: 0.65rem; color: #666;">محفظة 2</span>
                <span class="masked-num">75****01017</span>
            </div>
        </div>

        <button class="btn-gold" onclick="window.location.href='https://wa.me/201021664984'">واتساب المبادرة 💰</button>

        <div class="social-row">
            <a href="#" class="social-link">🎬 تيك توك</a>
            <a href="#" class="social-link">👥 فيسبوك</a>
            <a href="#" class="social-link">📢 تليجرام</a>
        </div>
    </div>

    <div class="news-ticker">
        <div class="ticker-text">
            القائد عصام الكومي يرحب بكم .. نظام بروتوكول أثير يغزو العالم .. الشفافية سر نجاحنا ..
        </div>
    </div>

</body>
</html>
