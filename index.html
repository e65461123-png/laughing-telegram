<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER | بروتوكول أثير 369</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000; color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* تثبيت الخلفية السيادية المفضلة لديك */
        #map-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://e65461123-png.github.io/Aether-Protocol/map.jpg'); 
            background-size: cover; background-position: center;
            filter: grayscale(70%) brightness(0.3) contrast(1.2);
            z-index: -1;
        }

        /* لوحة القيادة المعتمدة */
        .dashboard {
            position: absolute; top: 20px; right: 20px; width: 320px;
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #ffd700; border-radius: 10px;
            padding: 15px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            z-index: 10;
        }

        .header-title { color: #ffd700; text-align: center; font-size: 20px; margin-bottom: 5px; }
        .sub-header { text-align: center; color: #fff; font-size: 12px; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 8px; }

        .khazna-box {
            background: rgba(0, 50, 0, 0.8); border: 1px solid #0f0;
            padding: 15px; border-radius: 5px; text-align: center; margin-bottom: 10px;
        }

        .khazna-amount { font-size: 24px; font-weight: bold; color: #fff; }

        .console {
            background: #000; border: 1px solid #0f0; height: 100px;
            margin-top: 10px; padding: 10px; font-size: 12px; color: #0f0; overflow: hidden;
        }

        /* القائمة الجانبية الذهبية */
        .sidebar {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 20;
        }

        .sidebar-icon {
            width: 45px; height: 45px; background: rgba(0,0,0,0.8);
            border: 1.5px solid #ffd700; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; font-size: 22px;
        }

        .sidebar-icon:hover { transform: scale(1.2); background: #ffd700; color: #000; }

        .footer-bar {
            position: fixed; bottom: 0; width: 100%; background: #000;
            padding: 5px; font-size: 10px; color: #fff; border-top: 1px solid #ffd700;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="map-bg"></div>

    <div class="sidebar">
        <div class="sidebar-icon" title="الخزنة السيادية">🏛️</div>
        <div class="sidebar-icon" title="رصد البيتكوين">₿</div>
        <div class="sidebar-icon" title="محرك التشفير">🧩</div>
        <div class="sidebar-icon" title="مفتاح السيادة">🔑</div>
    </div>

    <div class="dashboard">
        <div class="header-title">بروتوكول أثير 369</div>
        <div class="sub-header">القائد العام: عصام الكومي</div>
        
        <div class="khazna-box">
            <div style="color: #0f0; font-size: 13px;">الخزنة السيادية (EGP):</div>
            <div class="khazna-amount" id="vault-display">19,146,368.107</div>
            <div style="font-size: 10px; color: #88ff88; margin-top: 8px;">
                EG05...5904 | 01017667875 | نشط 📡
            </div>
        </div>

        <div class="console" id="console-display">
            [ جاري بدء المنظومة... ]
        </div>
    </div>

    <div class="footer-bar">
        ⚠️ درع السيادة: مؤمن | القائد عصام 369 | 2026
    </div>

    <script>
        // نظام التحديث الحي للأرقام (Live Counter)
        let balance = 19146368.107;
        setInterval(() => {
            balance += (Math.random() - 0.5) * 0.04;
            document.getElementById('vault-display').innerText = balance.toLocaleString('en-US', {minimumFractionDigits: 3});
        }, 1500);

        // نظام الرسائل المتتابعة
        const log = [
            "[ نظام الرصد الأخلاقي نشط ومستعد... ]",
            "[ جاري مزامنة التردد 369 مع القمر الصناعي... ]",
            "[ تم رصد نشاط رقمي في قطاع الدلتا... ]",
            "[ بروتوكول أثير: البيانات مؤمنة بنسبة 100% ]"
        ];
        let msgIdx = 0;
        setInterval(() => {
            const screen = document.getElementById('console-display');
            screen.style.opacity = 0;
            setTimeout(() => {
                screen.innerText = log[msgIdx];
                screen.style.opacity = 1;
                msgIdx = (msgIdx + 1) % log.length;
            }, 500);
        }, 4500);
    </script>
</body>
</html>
