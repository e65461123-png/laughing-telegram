<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER FINANCE | المركز المالي العالمي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --cyan: #00fff7; --bg: #01080e; --success: #00ff88; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Cairo', sans-serif; overflow-x: hidden; }

        /* الساعة العالمية */
        .world-clocks { display: flex; justify-content: space-around; background: rgba(0, 20, 40, 0.8); padding: 10px; border-bottom: 2px solid var(--gold); font-family: 'Orbitron'; font-size: 14px; }
        .clock-item { text-align: center; color: var(--gold); }

        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 215, 0, 0.2); border-radius: 15px; padding: 20px; backdrop-filter: blur(10px); }
        .card-title { color: var(--gold); font-family: 'Orbitron'; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }

        /* أسعار حية */
        .price-tag { font-size: 28px; font-family: 'Orbitron'; text-align: center; margin: 15px 0; color: #fff; }
        .up { color: var(--success); }

        /* بوابة التحويل */
        .swap-input { width: 100%; background: #000; border: 1px solid var(--gold); padding: 10px; color: #fff; border-radius: 5px; margin: 5px 0; }
        .action-btn { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .action-btn:hover { background: #fff; box-shadow: 0 0 20px var(--gold); }

        /* قائمة الأسهم */
        .stock-list { list-style: none; padding: 0; }
        .stock-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; font-size: 14px; }
        .buy-btn { background: var(--success); color: #000; border: none; padding: 2px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; }

    </style>
</head>
<body>

<div class="world-clocks">
    <div class="clock-item">CAIRO<br><span id="cairo-time">00:00:00</span></div>
    <div class="clock-item">LONDON<br><span id="london-time">00:00:00</span></div>
    <div class="clock-item">NEW YORK<br><span id="ny-time">00:00:00</span></div>
</div>

<div class="container">
    <div class="card">
        <div class="card-title"><i class="fa-solid fa-chart-line"></i> أسعار حية (Real-Time)</div>
        <div style="font-size:12px; color:#888;">GOLD (XAU/USD)</div>
        <div class="price-tag" id="gold-price">$2,341.20</div>
        <div style="font-size:12px; color:#888;">BITCOIN (BTC)</div>
        <div class="price-tag up" id="btc-price">$94,231.45</div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fa-solid fa-rotate"></i> بوابة التحويل السيادي</div>
        <label style="font-size:11px;">من:</label>
        <select class="swap-input"><option>USD - دولار أمريكي</option><option>EGP - جنيه مصري</option></select>
        <label style="font-size:11px;">إلى:</label>
        <select class="swap-input"><option>BTC - بيتكوين</option><option>GOLD - ذهب</option></select>
        <button class="action-btn" onclick="alert('جارِ معالجة التحويل عبر بروتوكول أثير...')">تحويل الآن عبرنا</button>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
        <div class="card-title"><i class="fa-solid fa-briefcase"></i> شراء أسهم الشركات (Investment)</div>
        <div class="stock-list">
            <div class="stock-row"><span>APPLE (AAPL)</span><span>$192.42</span><button class="buy-btn">شراء الآن</button></div>
            <div class="stock-row"><span>TESLA (TSLA)</span><span>$175.05</span><button class="buy-btn">شراء الآن</button></div>
            <div class="stock-row"><span>AETHER CORP</span><span class="up">$369.00</span><button class="buy-btn">شراء الآن</button></div>
            <div class="stock-row"><span>GOOGLE (GOOGL)</span><span>$142.10</span><button class="buy-btn">شراء الآن</button></div>
        </div>
    </div>
</div>

<script>
    // نظام الساعات العالمية
    function updateClocks() {
        const now = new Date();
        const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        
        document.getElementById('cairo-time').innerText = new Intl.DateTimeFormat('en-GB', {...options, timeZone: 'Africa/Cairo'}).format(now);
        document.getElementById('london-time').innerText = new Intl.DateTimeFormat('en-GB', {...options, timeZone: 'Europe/London'}).format(now);
        document.getElementById('ny-time').innerText = new Intl.DateTimeFormat('en-GB', {...options, timeZone: 'America/New_York'}).format(now);
    }
    setInterval(updateClocks, 1000);

    // محاكاة تغير الأسعار الحية
    setInterval(() => {
        let gold = 2341 + Math.random();
        let btc = 94231 + (Math.random() * 10);
        document.getElementById('gold-price').innerText = `$${gold.toLocaleString('en-US', {minimumFractionDigits:2})}`;
        document.getElementById('btc-price').innerText = `$${btc.toLocaleString('en-US', {minimumFractionDigits:2})}`;
    }, 3000);
</script>

</body>
</html>
