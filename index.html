<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بروتوكول أثير | منصة EH369</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(23, 32, 54, 0.8);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 230, 118, 0.2);
            border: 1px solid rgba(0, 230, 118, 0.3);
        }

        h1 {
            color: #00e676;
            font-size: 24px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tagline {
            color: #8a99ad;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .dashboard {
            background: #111827;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #00e676;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #1f2937;
        }

        .stat-row:last-child {
            border-bottom: none;
        }

        .betting-section {
            background: #172036;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #2d3748;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #a0aec0;
            font-size: 14px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #4a5568;
            background: #0f172a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }

        .btn-predict {
            width: 100%;
            background: linear-gradient(135px, #00e676 0%, #00b0ff 100%);
            color: #000;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 10px;
        }

        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 230, 118, 0.4);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
            font-size: 16px;
        }

        .success {
            background-color: rgba(0, 230, 118, 0.15);
            border: 1px solid #00e676;
            color: #00e676;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 11px;
            color: #4a5568;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ATHEER PROTOCOL</h1>
        <div class="tagline">نظام السيادة الرقمية والتحليل الذاتي • EH369</div>

        <div class="dashboard">
            <div class="stat-row">
                <span>حالة الخادم الذكي:</span>
                <span style="color: #00e676; font-weight: bold;">مُتصل ونشط</span>
            </div>
            <div class="stat-row">
                <span>تشفير البيانات:</span>
                <span style="color: #00b0ff;">End-to-End (مشفر)</span>
            </div>
            <div class="stat-row">
                <span>معدل دقة النظام الحالي:</span>
                <span style="color: #ffd600;">94.2%</span>
            </div>
        </div>

        <div class="betting-section">
            <h3 style="margin-top: 0; color: #00b0ff;">محرك التوقعات الرياضية والمالية</h3>
            
            <div class="input-group">
                <label for="market-type">اختر سوق التوقع:</label>
                <select id="market-type" onchange="updateMarkets()">
                    <option value="sports">مباريات كرة القدم العالمية</option>
                    <option value="crypto">اتجاهات العملات الرقمية (Crypto)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="event-select">اختر الحدث القائم:</label>
                <select id="event-select"></select>
            </div>

            <div class="input-group">
                <label for="bet-amount">القيمة الافتراضية للنقاط / الرهان:</label>
                <input type="number" id="bet-amount" value="100" min="10">
            </div>

            <button class="btn-predict" onclick="generatePrediction()">معالجة وتوليد التوقع الذكي</button>

            <div id="result" class="result-box success"></div>
        </div>

        <div class="footer-text">
            حقوق التطوير محفوظة لـ المعماري والمبتكر الرقمي عصام الكومي © 2026
        </div>
    </div>

    <script>
        const dataOptions = {
            sports: [
                "ريال مدريد ضد برشلونة",
                "مانشستر سيتي ضد ليفربول",
                "الأهلي ضد الزمالك",
                "بايرن ميونخ ضد باريس سان جيرمان"
            ],
            crypto: [
                "اتجاه البتكوين (BTC/USDT) خلال 4 ساعات",
                "اتجاه إيثيريوم (ETH/USDT) اليومي",
                "مؤشر حركة العملات البديلة الميمية"
            ]
        };

        function updateMarkets() {
            const marketType = document.getElementById("market-type").value;
            const eventSelect = document.getElementById("event-select");
            eventSelect.innerHTML = "";
            
            dataOptions[marketType].forEach(event => {
                let option = document.createElement("option");
                option.value = event;
                option.text = event;
                eventSelect.appendChild(option);
            });
        }

        function generatePrediction() {
            const event = document.getElementById("event-select").value;
            const amount = document.getElementById("bet-amount").value;
            const resultBox = document.getElementById("result");

            if(!amount || amount <= 0) {
                alert("الرجاء إدخال قيمة صحيحة");
                return;
            }

            const outcomes = [
                "فوز الفريق الأول بنسبة صعود قوية (+2.5)",
                "تحول إيجابي غير متوقع وصعود فوري في الدقائق الأخيرة",
                "تحليل الخوارزمية يرجح: التعادل أو ثبات السعر الحالي",
                "هبوط مؤقت يتبعه قفزة سريعة للأعلى",
                "تفوق كاسح للطرف الثاني بناء على قراءة التدفقات الحالية"
            ];

            const randomOutcome = outcomes[Math.floor(Math.random() * outcomes.length)];

            resultBox.style.display = "block";
            resultBox.innerHTML = `
                ⚙️ تم تحليل الحدث: (${event})<br>
                💰 القيمة المعالجة: ${amount} نقطة<br><br>
                <span style="color: #ffd600;">🔮 التوقع النهائي لـ EH369:</span><br>
                ${randomOutcome}
            `;
        }

        window.onload = updateMarkets;
    </script>
</body>
</html>
