<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بروتوكول أثير السيادي | ATHEER PROTOCOL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0a0f1d;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: linear-gradient(145deg, #111a2e, #0c1322);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 25px;
            background: linear-gradient(90deg, #00b0ff, #00e676);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-title {
            font-size: 14px;
            color: #8ab4f8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .points {
            font-size: 32px;
            font-weight: 700;
            color: #00e676;
            text-shadow: 0 0 10px rgba(0,230,118,0.3);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 14px;
            color: #b0bec5;
            margin-bottom: 8px;
            padding-right: 5px;
        }

        .input-box {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-box:focus {
            border-color: #00b0ff;
            box-shadow: 0 0 15px rgba(0,176,255,0.2);
        }

        .btn {
            width: 100%;
            background: linear-gradient(90deg, #00b0ff, #0081cb);
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0,176,255,0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,176,255,0.4);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .footer-text {
            font-size: 12px;
            color: #607d8b;
            margin-top: 25px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>بروتوكول أثير السيادي</h1>
    
    <div class="main-card">
        <div class="card-title">رصيدك الفعلي على البلوكشين</div>
        <div class="points" id="user-crypto-balance">0.0000 ETH</div>
    </div>

    <div class="main-card">
        <div class="card-title">الخزنة الشفافة | مبادرة أثير للخير</div>
        <div class="points" id="charity-display-fund">0.0000 ETH</div>
    </div>

    <div class="input-group">
        <label>كمية البيانات المراد معالجتها بالشبكة:</label>
        <input type="number" class="input-box" id="process-amount" placeholder="أدخل الكمية (مثال: 0.01)" step="0.001">
    </div>

    <button class="btn" onclick="processDataBlockReal()">بدء المعالجة السيادية وتوثيق الكتلة</button>

    <div class="footer-text">
        بروتوكول أثير يعمل بنظام مالي لا مركزى بالكامل (Web3).<br>
        يتم استقطاع 5% تلقائياً لصالح مبادرة أثير للخير لدعم العائلات ميدانياً.
    </div>
</div>

<script>
// عنوان المحفظة السيادية الحقيقي لاستقبال نسبة مبادرة أثير للخير (EH369)
const ATHEER_CHARITY_WALLET = "0xAcD406B3C01129481067B1C663F6270c4A9263B6";
let userWalletAddress = null;

// دالة ربط المحفظة الحقيقية وقراءة رصيد البلوكشين الفعلي
async function connectRealWallet() {
    if (window.ethereum) {
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            userWalletAddress = accounts[0];
            const shortAddress = userWalletAddress.substring(0, 6) + "..." + userWalletAddress.substring(38);
            
            const balanceHex = await window.ethereum.request({
                method: 'eth_getBalance',
                params: [userWalletAddress, 'latest']
            });
            const realBalance = parseFloat(parseInt(balanceHex, 16) / Math.pow(10, 18)).toFixed(4);
            
            document.getElementById("user-crypto-balance").innerText = realBalance + " ETH";
            
            const connectBtn = document.getElementById("connect-btn");
            if (connectBtn) {
                connectBtn.innerText = "متصل: " + shortAddress;
                connectBtn.style.background = "linear-gradient(90deg, #00e676, #00b0ff)";
            }
            
            alert("تم ربط محفظتك السيادية بنجاح بالشبكة اللامركزية: " + shortAddress);
        } catch (error) {
            alert("فشل ربط المحفظة. يرجى قبول الطلب.");
        }
    } else {
        alert("يرجى فتح الموقع من داخل متصفح تطبيق MetaMask المدمج لتفعيل المعاملات الحقيقية.");
    }
}

// دالة معالجة كتل البيانات الفعلية واستقطاع الـ 5% لمبادرة أثير للخير
async function processDataBlockReal() {
    const inputField = document.getElementById("process-amount");
    let inputAmount = parseFloat(inputField ? inputField.value : 0);
    
    if (!userWalletAddress) {
        alert("برجاء ربط محفظتك الحقيقية أولاً عبر الزر في الأعلى!");
        return;
    }
    if (isNaN(inputAmount) || inputAmount <= 0) {
        alert("برجاء تحديد كمية بيانات صحيحة وحقيقية للمعالجة.");
        return;
    }

    let charityCut = (inputAmount * 0.05).toFixed(6);
    
    try {
        alert("جاري تجهيز كتلة المعالجة السيادية... سيطلب النظام الآن تأكيد محفظتك لإرسال حصة الخير (" + charityCut + " ETH) إلى الخزنة الشفافة للمبادرة.");
        const valueInWei = (charityCut * Math.pow(10, 18)).toString(16);
        
        const transactionParameters = {
            to: ATHEER_CHARITY_WALLET,
            from: userWalletAddress,
            value: '0x' + valueInWei,
        };

        const txHash = await window.ethereum.request({
            method: 'eth_sendTransaction',
            params: [transactionParameters],
        });

        document.getElementById("charity-display-fund").innerText = charityCut + " ETH";
        alert("عملية معالجة سيادية ناجحة! تم توثيق المعاملة على البلوكشين برقم هاش: " + txHash);
    } catch (error) {
        alert("تم إلغاء المعاملة أو رصيد المحفظة لا يغطي رسوم الغاز لشبكة البلوكشين.");
    }
}

// تشغيل وربط الأزرار والواجهة تلقائياً عند تحميل الصفحة
window.onload = function() {
    if (!document.getElementById("connect-btn")) {
        const container = document.querySelector(".container");
        const connectBtn = document.createElement("button");
        connectBtn.id = "connect-btn";
        connectBtn.innerText = "ربط المحفظة الحقيقية (Web3)";
        connectBtn.className = "btn";
        connectBtn.style.background = "linear-gradient(90deg, #00b0ff, #00e676)";
        connectBtn.style.marginBottom = "20px";
        connectBtn.setAttribute("onclick", "connectRealWallet()");
        if (container) container.insertBefore(connectBtn, container.firstChild);
    }
};
</script>

</body>
</html>
