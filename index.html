
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية أثير | الرادار والبث المباشر</title>
    <style>
        :root {
            --neon-green: #00ff41;
            --deep-black: #050505;
            --gold: #ffeb3b;
            --radar-fade: rgba(0, 255, 65, 0.2);
        }

        body {
            background-color: var(--deep-black);
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 1. تصميم الرادار الاحترافي */
        .radar-container {
            margin-top: 30px;
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 2px solid var(--neon-green);
            position: relative;
            background: radial-gradient(circle, #00ff4110 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        /* خط الرادار المتحرك */
        .radar-sweep {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 0; left: 50%;
            background: linear-gradient(45deg, var(--neon-green) 0%, transparent 50%);
            transform-origin: bottom left;
            border-radius: 100% 0 0 0;
            animation: sweep 4s linear infinite;
        }

        @keyframes sweep {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* دوائر الرادار الداخلية */
        .radar-circle {
            position: absolute;
            border: 1px solid rgba(0, 255, 65, 0.1);
            border-radius: 50%;
        }

        .visitor-info {
            z-index: 10;
            text-align: center;
        }

        .stat-label { font-size: 0.7rem; color: #888; display: block; }
        .stat-count { font-size: 1.8rem; font-weight: 900; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

        /* 2. نافذة البث المباشر الاحترافية */
        .live-stream-window {
            width: 90%;
            max-width: 420px;
            height: 230px;
            background: #000;
            margin-top: 25px;
            border-radius: 25px;
            border: 1px solid #222;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .live-tag {
            position: absolute;
            top: 15px; right: 15px;
            background: #ff0000;
            color: white;
            padding: 3px 12px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: bold;
            animation: pulse-red 1.5s infinite;
            z-index: 5;
        }

        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* 3. بوابة الاستثمار (التنسيق المتناسق) */
        .investment-hub {
            width: 90%;
            max-width: 420px;
            background: #111;
            border-radius: 30px;
            padding: 25px;
            margin-top: 25px;
            border: 1px solid #1a1a1a;
        }

        .wallet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .wallet-card {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 18px;
            border: 1px solid #222;
            text-align: center;
        }

        .wallet-id { color: var(--neon-green); font-size: 0.9rem; direction: ltr; display: block; margin-top: 5px; }

        .btn-gold {
            background: var(--gold);
            color: #000;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            margin-top: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 242, 64, 0.2);
        }

        /* الشريط الإخباري */
        .ticker-bar {
            position: fixed;
            bottom: 0; width: 100%;
            background: #000;
            border-top: 1px solid var(--neon-green);
            padding: 12px 0;
            white-space: nowrap;
            overflow: hidden;
        }

        .ticker-inner {
            display: inline-block;
            animation: ticker-move 20s linear infinite;
            color: var(--neon-green);
            font-weight: bold;
        }

        @keyframes ticker-move {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <div class="radar-container">
        <div class="radar-sweep"></div>
        <div class="radar-circle" style="width: 60%; height: 60%;"></div>
        <div class="radar-circle" style="width: 30%; height: 30%;"></div>
        <div class="visitor-info">
            <span class="stat-label">نشط الآن</span>
            <span class="stat-count" id="live-users">3,565</span>
        </div>
    </div>

    <div class="live-stream-window">
        <div class="live-tag">LIVE ● بث مباشر</div>
        <div style="text-align: center; color: #444;">
            <p>ATHEER LIVE STREAM</p>
            <small>اتصال آمن ببروتوكول أثير...</small>
        </div>
    </div>

    <div class="investment-hub">
        <h3 style="margin: 0 0 20px 0; text-align: center; color: var(--gold);">💰 بوابة التدفق المالي</h3>
        
        <div class="wallet-grid">
            <div class="wallet-card">
                <span style="font-size: 0.7rem; color: #666;">محفظة 1</span>
                <span class="wallet-id">01021664984</span>
            </div>
            <div class="wallet-card">
                <span style="font-size: 0.7rem; color: #666;">محفظة 2</span>
                <span class="wallet-id">01017667875</span>
            </div>
        </div>

        <button class="btn-gold" onclick="window.location.href='https://wa.me/201021664984'">واتساب المبادرة</button>
    </div>

    <div class="ticker-bar">
        <div class="ticker-inner">
            القائد عصام الكومي يرحب بكم .. نظام البث المباشر والسيادة الرقمية متاح الآن .. استعدوا لغزو العالم رقمياً .. الشفافية هي سر قوتنا ..
        </div>
    </div>

    <script>
        // جعل عداد الزوار "حي" ويتحرك لزيادة المصداقية
        setInterval(() => {
            let el = document.getElementById('live-users');
            let current = parseInt(el.innerText.replace(/,/g, ''));
            el.innerText = (current + Math.floor(Math.random() * 3)).toLocaleString();
        }, 4000);
    </script>

</body>
</html>
