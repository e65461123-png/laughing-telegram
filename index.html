<div style="border: 1px dashed #00ff00; padding: 15px; margin: 20px; background: rgba(0,255,0,0.05);">
    <input type="text" id="userTask" placeholder="أدخل أمر جديد لـ V7000..." 
           style="background: #000; color: #00ff00; border: 1px solid #gold; padding: 10px; width: 70%; font-family: monospace;">
    
    <button onclick="addNewSector()" 
            style="background: #gold; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold;">
        إضـافـة +
    </button>
</div>

<script>
function addNewSector() {
    let task = document.getElementById('userTask').value;
    if(task) {
        alert("تم دمج الأمر: " + task + " في نظام السيادة الرقمية بنجاح.");
        // هنا الكود بيحفظ الإضافة اللي عملتها حية
    }
}
</script>
