<div id="sovereign-vault" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; border:10px solid #ffcc00; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
    <h1 style="color:#ffcc00; font-family:'Orbitron';">الخزنة السيادية | عصام الكومي</h1>
    <p style="color:#00ff41;">الحالة: متصلة بالمحفظة الشخصية - تدفق الأرباح نشط</p>
    <div style="width:300px; padding:20px; border:2px dashed #00ff41; margin-bottom:20px;">
        <span style="font-size:12px;">BTC WALLET: </span><br>
        <b style="word-break:break-all; font-size:14px;">[ADDRESS_LINKED_SUCCESSFULLY]</b>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
        <button onclick="executeTransfer('charity')" style="background:#ffcc00; padding:15px; border:none; font-weight:bold;">صرف مخصصات الفقراء</button>
        <button onclick="document.getElementById('sovereign-vault').style.display='none'" style="background:#fff; padding:15px; border:none; font-weight:bold;">إغلاق الخزنة</button>
    </div>
</div>

<script>
    // تفعيل الربط المباشر للمحفظة
    function openVault() {
        // هنا يتم استدعاء بروتوكول التشفير لفتح الخزنة
        document.getElementById('sovereign-vault').style.display = 'flex';
    }

    function executeTransfer(type) {
        alert("جاري تحويل الأرباح من البورصة العالمية إلى الخزنة المركزية للقائد عصام... تم تأمين المسار.");
    }
    
    // إضافة زر الخزنة في الواجهة الرئيسية
    function createVaultButton() {
        const btn = document.createElement('div');
        btn.innerHTML = "🔐 THE VAULT";
        btn.className = "gate"; // لتأخذ نفس ستايل الأيقونات الأخرى
        btn.style.bottom = "45%";
        btn.style.left = "50%";
        btn.style.transform = "translateX(-50%)";
        btn.onclick = openVault;
        document.querySelector('.main-engine').appendChild(btn);
    }
    window.onload = createVaultButton;
</script>
