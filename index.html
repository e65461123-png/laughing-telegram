<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER CORE V6.0</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #000; color: #00ffcc; font-family: monospace; margin: 0; padding: 20px; text-align: center; }
        .box { border: 2px solid #00ffcc; padding: 20px; background: rgba(0,255,204,0.05); box-shadow: 0 0 20px #00ffcc; border-radius: 15px; display: inline-block; width: 90%; max-width: 500px; }
        .price { font-size: 2.2em; color: #0f0; text-shadow: 0 0 10px #0f0; display: block; margin: 15px 0; }
        h1 { color: gold; text-shadow: 0 0 10px gold; margin: 0; }
        .status { color: cyan; font-size: 0.9em; animation: blink 2s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <div class="box">
        <h1>MASTER_V6000</h1>
        <p>نظام أثير - السيادة الرقمية</p>
        <hr style="border: 0.5px solid #333;">
        <p>سعر البيتكوين الحي:</p>
        <span id="btc-price" class="price">...جاري الرصد</span>
        <p class="status">الحالة: متصل بـ FIREBASE_NODE</p>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDeqhNNIh41LXnu_O8ZyrwH4rj8TFBaKGo",
            authDomain: "aether-core-70770.firebaseapp.com",
            projectId: "aether-core-70770",
            databaseURL: "https://aether-core-70770-default-rtdb.firebaseio.com/",
            appId: "1:316022047365:web:951fc03d2a0d4fcca39fec"
        };
        firebase.initializeApp(firebaseConfig);

        async function updatePrice() {
            try {
                const res = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
                const data = await res.json();
                document.getElementById('btc-price').innerText = "$" + data.bitcoin.usd.toLocaleString();
            } catch (e) { console.log("Updating..."); }
        }
        setInterval(updatePrice, 10000);
        updatePrice();
    </script>
</body>
</html>
