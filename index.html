<div id="investor-hub" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px;">
    <div class="stat-card" style="background: rgba(255,204,0,0.05); border: 1px solid var(--gold); padding: 15px; border-radius: 10px;">
        <h4 style="margin:0; color:var(--gold);">📈 مؤشر نمو أثير</h4>
        <div style="font-size: 30px; color:var(--green); margin: 10px 0;">+24.8%</div>
        <p style="font-size: 11px; color:#888;">معدل العائد السنوي المتوقع للمستثمرين</p>
    </div>

    <div class="stat-card" style="background: rgba(0,255,65,0.05); border: 1px solid var(--green); padding: 15px; border-radius: 10px;">
        <h4 style="margin:0; color:var(--green);">🤝 الأثر المجتمعي</h4>
        <div style="font-size: 30px; color:var(--gold); margin: 10px 0;">15,400</div>
        <p style="font-size: 11px; color:#888;">إجمالي المستفيدين من مبادرة الخير</p>
    </div>

    <div class="stat-card" style="grid-column: span 2; background: #0a0a0a; border: 1px solid #333; padding: 15px; border-radius: 10px;">
        <h4 style="margin:0; color:var(--gold);">💎 إجمالي قيمة الأصول (AUM)</h4>
        <div style="font-size: 35px; font-family: monospace;" id="asset-value">$2,845,900.00</div>
        <div style="height: 5px; background: #222; margin-top: 10px; border-radius: 5px;">
            <div style="width: 75%; height: 100%; background: var(--gold); box-shadow: 0 0 10px var(--gold);"></div>
        </div>
    </div>
</div>
