<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aether | Nature Breaker Ultimate</title>
    <style>
        :root { --neon: #00ff41; --gold: #ffd700; --bg: #000; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        
        /* شريط الأرصدة العلوي */
        .top-nav { display: flex; justify-content: space-around; padding: 10px; border-bottom: 2px solid var(--neon); background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 1000; font-size: 0.7rem; }
        .val { color: var(--neon); font-weight: bold; display: block; }

        /* منطقة الرادار */
        .main-display { padding: 10px; text-align: center; }
        #mapView { width: 100%; height: 300px; border: 1px solid var(--neon); border-radius: 10px; margin-bottom: 10px; }
        
        /* عين الغراب */
        .core-circle { width: 140px; height: 140px; border: 4px double var(--gold); border-radius: 50%; margin: 15px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 0 15px var(--gold); }

        /* شريط الأوامر العائم (المكان الذي ستكتب فيه) */
        .cmd-bar { 
            position: fixed; 
            bottom: 30px; /* مرتفع عن الحافة لضمان الظهور */
            left: 50%;
            transform: translateX(-50%);
            width: 90%; 
            background: #111; 
            border: 2px solid var(--gold); /* لون ذهبي لتمييزه */
            border-radius: 15px;
            padding: 12px; 
            display: flex; 
            z-index: 99999; /* أعلى طبقة في الصفحة */
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }
        #cmdInput { 
            background: transparent; 
            border: none; 
            color: white; 
            width: 100%; 
            font-size: 1.1rem; 
            outline: none;
            text-align: center;
        }

        #gateView { width: 100%; height: 350px; border: 2px solid var(--gold); display: none; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="stat">TIME<span id="clock" class="val">--:--</span></div>
        <div class="stat">BITCOIN<span class="val">$84.3K</span></div>
        <div class="stat">GOLD<span class="val" style="color:var(--gold)">$2.6K</span></div>
        <div class="stat">369<span class="val">SECURED</span></div>
    </div>

    <div class="main-display">
        <iframe id="mapView" src="https://www.windy.com/?30.044,31.236,6"></iframe>
        
        <div class="core-circle">
            <h3 style="color:var(--gold); margin:0; font-size: 0.9rem;">RAVEN EYE</h3>
            <small style="color:var(--neon)">V4 MASTER</small>
        </div>

        <div id="log" style="color:var(--neon); font-size: 0.8rem; margin-bottom: 10px;">AWAITING COMMAND...</div>
        <iframe id="gateView" src=""></iframe>
    </div>

    <div class="cmd-bar">
        <input type="text" id="cmdInput" placeholder="اكتب هنا: /master أو /cosmos" onkeypress="run(event)">
    </div>

    <script>
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        function run(e) {
            if (e.key === "Enter") {
                const cmd = document.getElementById('cmdInput').value.toLowerCase();
                const log = document.getElementById('log');
                const gate = document.getElementById('gateView');

                if (cmd === "/cosmos") {
                    log.innerText = "COSMOS PORTAL OPENED.";
                    gate.src = "https://sky.esa.int/esasky-embed/?target=NGC%201300&zoom=0.5";
                    gate.style.display = "block";
                    gate.scrollIntoView({ behavior: 'smooth' });
                } else if (cmd === "/master") {
                    log.innerText = "WELCOME MASTER ESSAM ELKOMY.";
                    log.style.color = "var(--gold)";
                }
                document.getElementById('cmdInput').value = "";
            }
        }
    </script>
</body>
</html>
