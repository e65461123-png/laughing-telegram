<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AETHER | مركز القيادة</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #000; color: #00ff41; font-family: monospace; overflow: hidden; }
        #live-map { width: 100vw; height: 100vh; filter: invert(100%) hue-rotate(180deg) brightness(0.6); }
        .control-panel { position: absolute; top: 10px; right: 10px; z-index: 1000; background: rgba(0,20,0,0.9); padding: 20px; border: 2px solid #ffcc00; width: 300px; border-radius: 10px; }
        #terminal { height: 150px; background: #000; overflow-y: auto; font-size: 0.8rem; color: #ffcc00; padding: 5px; border-top: 1px solid #00ff41; margin-top: 10px; }
    </style>
</head>
<body>

<div class="control-panel">
    <h2 style="color:#ffcc00; margin:0;">بروتوكول أثير</h2>
    <p>القائد: عصام الكومي</p>
    <hr>
    <div style="font-size: 0.9rem;">
        الخزنة: <span id="vault">19,146,368 EGP</span><br>
        الحساب: EG05...5904
    </div>
    <div id="terminal">
        [SYS]: جاري الاتصال بالأقمار الصناعية...<br>
    </div>
</div>

<div id="live-map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // هذا هو الكود الذي كان يظهر كـ نص، الآن وضعناه داخل وسوم البرمجة الصحيحة
    async function getLiveEnvironment(lat, lon) {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
        const data = await response.json();
        return data.current_weather;
    }

    function initSovereignMap() {
        const map = L.map('live-map', { zoomControl: false }).setView([30.0444, 31.2357], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // نقطة مشروع تطهير الترع
        const canalProject = L.circle([31.0379, 31.3815], {
            color: '#ffcc00', fillColor: '#ffcc00', fillOpacity: 0.5, radius: 15000
        }).addTo(map);
        canalProject.bindPopup("<b>مشروع تطهير الترع - جاري العمل</b>");

        setInterval(async () => {
            const weather = await getLiveEnvironment(30.0444, 31.2357);
            const term = document.getElementById('terminal');
            term.innerHTML += `<div>[SENSOR]: رصد حي - الجو: ${weather.temperature}°C | رياح: ${weather.windspeed}كم</div>`;
            term.scrollTop = term.scrollHeight;
        }, 10000);
    }

    window.onload = initSovereignMap;
</script>

</body>
</html>
