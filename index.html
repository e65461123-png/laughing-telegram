<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATHEER V8000 - MASTER ESSAM ELKOMY</title>
    <style>
        :root { --neon: #00ff00; --gold: #ffd700; }
        body { background: #000; color: var(--neon); font-family: 'Courier New', monospace; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* شريط التحكم الحي العلوي */
        .header-live { border-bottom: 2px solid var(--gold); padding: 10px; background: rgba(0,20,0,0.9); display: flex; justify-content: space-around; font-size: 0.75em; }
        
        /* واجهة Raven Eye الأصلية */
        .radar-container { border: 2px solid var(--neon); border-radius: 50%; width: 200px; height: 200px; margin: 20px auto; position: relative; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        .radar-sweep { width: 50%; height: 2px; background: var(--neon); position: absolute; top: 50%; left: 50%; transform-origin: 0% 0%; animation: scan 3s linear infinite; }
        
        /* الأرصدة والبيانات الحقيقية */
        .grid-data { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .module { border: 1px solid var(--gold); padding: 10px; background: rgba(0,40,0,0.2); text-align: right; direction: rtl; }
        .module h4 { margin: 0 0 10px 0; color: var(--gold); border-bottom: 1px solid var(--gold); font-size: 0.9em; }

        /* الحقوق والسيادة */
        .footer-rights { position: fixed; bottom: 0; width: 100%; background: #000; color: var(--gold); font-size: 11px; padding: 5px; border-top: 1px solid var(--gold); }
        
        @keyframes scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .live-dot { height: 8px; width: 8px; background: red; border-radius: 50%; display: inline-block; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="header-live">
        <div>🛰️ الفضاء: <span id="sat-alt">جاري الرصد...</span></div>
        <div>💰 بورصة: <span id="btc-live">0.00$</span></div>
        <div><span class="live-dot"></span> مباشر</div>
    </div>

    <div class="radar-container">
        <div class="radar-sweep"></div>
    </div>

    <h2 style="color: var(--gold); margin: 0;">NATURE BREAKER V4</h2>
    <p style="font-size: 0.8em;">نظام السيادة الرقمية - بروتوكول أثير</p>

    <div class="grid-data">
        <div class="module">
            <h4>📈 المراقبة المالية</h4>
            <div>البيتكوين: <span id="m-btc">...</span></div>
            <div>فودافون كاش: 150,000 EGP</div>
        </div>
        <div class="module">
            <h4>🌍 رصد الأرض</h4>
            <div id="m-loc">إحداثيات: 30.04, 31.23</div>
            <div>الوضع: <span style="color:var(--gold)">مؤمن 🛡️</span></div>
        </div>
    </div>

    <div onclick="alert('Master Access Granted')" style="height: 20px; width: 20px; position: absolute; top:0; left:0;"></div>

    <div class="footer-rights">
        تأليف عصام الكومي - جميع الحقوق محفوظة لبروتوكول أثير © 2026
    </div>

    <script>
        async function updateAtheer() {
            try {
                // جلب بيانات حية من البورصة
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                const data = await res.json();
                const price = parseFloat(data.price).toLocaleString();
                document.getElementById('btc-live').innerText = `$${price}`;
                document.getElementById('m-btc').innerText = `$${price}`;

                // جلب بيانات الأقمار الصناعية
                const satRes = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const satData = await satRes.json();
                document.getElementById('sat-alt').innerText = `${satData.altitude.toFixed(0)} KM`;
                document.getElementById('m-loc').innerText = `LAT: ${satData.latitude.toFixed(2)}`;
            } catch (e) { console.log("System Sync..."); }
        }

        setInterval(updateAtheer, 2000);
        updateAtheer();
    </script>
</body>
</html>
